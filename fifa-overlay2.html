<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Scoreboard Overlay - Mundial 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;1,700&display=swap');
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 12px;
            background-color: transparent;
            font-family: 'Barlow Condensed', sans-serif;
            overflow: hidden;
        }
        .overlay-row {
            --home-a: #00ffc8; --home-b: #ffffff;
            --away-a: #8a6bff; --away-b: #ffffff;
            display: flex; align-items: center; width: fit-content;
        }
        .scoreboard {
            display: flex; align-items: center;
            background: #0a0a0a; border-radius: 50px;
            padding: var(--sb-pad-v, 8px) var(--sb-pad-h, 28px); width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative; isolation: isolate; z-index: 2;
            border: 1px solid rgba(255,255,255,0.08);
        }
        /* grids de colores asociados a cada bandera, confinados a cada lado */
        .scoreboard::before, .scoreboard::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 58%;
            z-index: 0; pointer-events: none; opacity: 0.16; mix-blend-mode: screen;
            background-image:
                repeating-linear-gradient(90deg, currentColor 0 1px, transparent 1px 14px),
                repeating-linear-gradient(0deg,  currentColor 0 1px, transparent 1px 14px);
        }
        .scoreboard::before {
            left: 0; color: var(--home-a); border-radius: 50px 0 0 50px;
            -webkit-mask-image: linear-gradient(90deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
            -webkit-mask-composite: destination-in;
                    mask-image: linear-gradient(90deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
                    mask-composite: intersect;
        }
        .scoreboard::after {
            right: 0; color: var(--away-a); border-radius: 0 50px 50px 0;
            -webkit-mask-image: linear-gradient(270deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
            -webkit-mask-composite: destination-in;
                    mask-image: linear-gradient(270deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
                    mask-composite: intersect;
        }
        /* Anillo grueso uniforme en todo el perímetro */
        .accent-line {
            position: absolute; inset: -6px;
            border-radius: 58px; z-index: -1; pointer-events: none;
            padding: 6px;
            background: linear-gradient(90deg, var(--home-a), var(--home-b) 45%, var(--away-b) 55%, var(--away-a));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
                    mask-image: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                    mask-composite: exclude;
            filter: drop-shadow(0 0 4px var(--home-a)) drop-shadow(0 0 4px var(--away-a));
            opacity: 0.9;
            clip-path: inset(8px 0 0 0 round 58px);
        }
        .timer-box {
            background: #fff; color: #000;
            padding: var(--timer-pad-v, 8px) var(--timer-pad-r, 32px) var(--timer-pad-v, 8px) var(--timer-pad-l, 20px);
            font-size: var(--timer-font, 22px); font-weight: 800;
            border-radius: 50px; min-width: var(--timer-min-w, 60px); text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            position: relative; z-index: 1; margin-right: var(--timer-overlap, -26px);
        }
        .teams-container { display: flex; align-items: center; }
        .team { position: relative; z-index: 2; display: flex; align-items: center; color: #fff; font-size: var(--team-font, 26px); letter-spacing: 2px; gap: var(--team-gap, 8px); }
        .flag { width: var(--flag-w, 34px); height: var(--flag-h, 22px); object-fit: cover; border-radius: 3px; box-shadow: 0 0 0 1px rgba(255,255,255,0.25); }
        .dot { width: var(--dot-size, 10px); height: var(--dot-size, 10px); border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot-home { background: var(--home-a); }
        .dot-away { background: var(--away-a); }
        .team-name { padding: 0 3px; font-weight: 700; white-space: nowrap; }
        .score-box {
            position: relative; z-index: 3;
            background: #00ffc8; color: #000;
            font-size: var(--score-font, 34px); font-weight: 900;
            padding: var(--score-pad-v, 10px) var(--score-pad-h, 14px); border-radius: 10px;
            margin: var(--score-margin-v, -13px) 0 var(--score-margin-v, -13px) 0;
            min-width: var(--score-min-w, 44px); text-align: center;
            align-self: stretch;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        #score-home { margin-right: var(--score-overlap, -8px); }
        #score-away { margin-left:  var(--score-overlap, -8px); }
        .logo-center {
            position: relative; z-index: 6;
            display: flex; align-items: center; justify-content: center;
            background: #111; border-radius: 12px;
            padding: var(--logo-pad-v, 8px) var(--logo-pad-h, 10px);
            margin: var(--logo-margin, -16px) 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .logo-center img { height: var(--logo-h, 58px); filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7)); }
        .pulse { animation: pulse-anim 0.4s ease-in-out; }
        @keyframes pulse-anim {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25); background-color: #ff0055; color: white; }
            100% { transform: scale(1); }
        }
        #event-panel {
            margin-top: 10px; width: fit-content; opacity: 0;
            transform: translateY(-12px) scale(0.95);
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
        }
        #event-panel.visible { opacity: 1; transform: translateY(0) scale(1); }
        .event-card {
            display: flex; align-items: center; gap: 12px;
            border-radius: 10px; padding: 8px 20px 8px 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6); min-width: 260px;
        }
        .event-card.goal     { background: linear-gradient(135deg,#00ffcc,#00d4aa); color:#000; }
        .event-card.yellow   { background: linear-gradient(135deg,#ffe600,#ffc200); color:#000; }
        .event-card.red      { background: linear-gradient(135deg,#ff1a1a,#cc0000); color:#fff; }
        .event-card.halftime { background: linear-gradient(135deg,#1a1a2e,#16213e); color:#fff; border:2px solid #00ffcc; }
        .event-card.fulltime { background: linear-gradient(135deg,#0f3460,#533483); color:#fff; border:2px solid #ffe600; }
        .event-card.penalty-winner { background: linear-gradient(135deg,#1a8a4a,#0d4a28); color:#fff; border:2px solid #ffd700; }
        .event-icon img.event-flag { width: 40px; height: 26px; object-fit: cover; border-radius: 4px; box-shadow: 0 0 0 1px rgba(255,255,255,0.4), 0 2px 8px rgba(0,0,0,0.5); }
        .event-icon  { font-size: 36px; line-height: 1; flex-shrink: 0; }
        .event-body  { display: flex; flex-direction: column; }
        .event-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; line-height: 1.1; }
        .event-sub   { font-size: 16px; font-weight: 400; opacity: 0.85; line-height: 1.2; }
        .scoreboard.flash-goal { animation: sb-goal  1s ease forwards; }
        .scoreboard.flash-card { animation: sb-card 0.6s ease forwards; }
        .scoreboard.flash-ht   { animation: sb-ht   0.8s ease forwards; }
        .scoreboard.flash-ft   { animation: sb-ft   1.2s ease forwards; }
        .scoreboard.flash-win  { animation: sb-win  1.6s ease forwards; }
        @keyframes sb-win  { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 25%,75%{box-shadow:0 0 55px 16px rgba(255,215,0,.9)} 50%{box-shadow:0 0 80px 26px rgba(255,215,0,.55)} }
        @keyframes sb-goal { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 30%{box-shadow:0 0 40px 10px rgba(0,255,204,.9)} 60%{box-shadow:0 0 60px 18px rgba(0,255,204,.5)} }
        @keyframes sb-card { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 40%{box-shadow:0 0 35px 8px rgba(255,80,0,.8)} }
        @keyframes sb-ht   { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 50%{box-shadow:0 0 40px 10px rgba(0,200,255,.7)} }
        @keyframes sb-ft   { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 25%,75%{box-shadow:0 0 50px 14px rgba(255,230,0,.85)} 50%{box-shadow:0 0 70px 22px rgba(255,230,0,.5)} }

        /* ── TRANSICIÓN DE ALTERNANCIA ── */
        .overlay-row { transition: opacity 0.4s ease; }
        .overlay-row.fading { opacity: 0; }

        /* ── SLOT ÚNICO DEBAJO DEL MARCADOR ──
           Badge 2do partido, tanda de penales y panel de eventos comparten
           el mismo lugar (apilados con position:absolute) para que nunca
           se sumen márgenes entre sí. La prioridad de cuál se ve la decide
           el JS (applyStackPriority): 1) badge 2do partido, 2) penales,
           3) animaciones de eventos. */
        .below-stack { position: relative; margin-top: 10px; width: fit-content; }
        .below-stack > #match2-badge,
        .below-stack > #penalty-wrap,
        .below-stack > #event-panel {
            position: absolute; top: 0; left: 0; margin-top: 0;
        }

        /* ── BADGE SEGUNDO PARTIDO ── */
        #match2-badge {
            display: none; align-items: center; gap: 10px;
            background: #111; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px; padding: 7px 18px 7px 12px;
            margin-top: 10px; width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            font-size: 20px; color: #fff; letter-spacing: 2px;
            font-weight: 700; white-space: nowrap;
        }
        #match2-badge.visible { display: flex; }
        #match2-badge .badge-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ff3b3b; box-shadow: 0 0 8px #ff3b3b;
            animation: blink-red 1s ease-in-out infinite; flex-shrink: 0;
        }
        @keyframes blink-red { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #match2-badge .badge-score { color: #00ffc8; }
        #match2-badge .badge-label { font-size: 12px; font-weight: 400; opacity: 0.5; margin-left: 4px; letter-spacing: 0; }

        /* ══════════════ TANDA DE PENALES ══════════════ */
        #penalty-wrap {
            margin-top: 10px; width: fit-content; opacity: 0;
            transform: translateY(-10px) scale(0.96);
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
        }
        #penalty-wrap.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

        .penalty-board {
            --home-a: #00ffc8; --home-b: #ffffff;
            --away-a: #8a6bff; --away-b: #ffffff;
            position: relative; isolation: isolate;
            background: #0a0a0a; border-radius: 50px;
            padding: 7px 16px 7px 20px; width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column; gap: 5px;
        }
        /* grid de fondo igual al scoreboard principal */
        .penalty-board::before, .penalty-board::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 55%;
            z-index: 0; pointer-events: none; opacity: 0.13; mix-blend-mode: screen;
            background-image:
                repeating-linear-gradient(90deg, currentColor 0 1px, transparent 1px 14px),
                repeating-linear-gradient(0deg,  currentColor 0 1px, transparent 1px 14px);
        }
        .penalty-board::before {
            left: 0; color: var(--home-a); border-radius: 50px 0 0 50px;
            -webkit-mask-image: linear-gradient(90deg, #000 55%, transparent 100%);
                    mask-image: linear-gradient(90deg, #000 55%, transparent 100%);
        }
        .penalty-board::after {
            right: 0; color: var(--away-a); border-radius: 0 50px 50px 0;
            -webkit-mask-image: linear-gradient(270deg, #000 55%, transparent 100%);
                    mask-image: linear-gradient(270deg, #000 55%, transparent 100%);
        }
        /* Anillo de acento igual al scoreboard */
        .penalty-board .accent-line {
            position: absolute; inset: -6px; border-radius: 58px; z-index: -1; pointer-events: none;
            padding: 6px;
            background: linear-gradient(90deg, var(--home-a), var(--home-b) 45%, var(--away-b) 55%, var(--away-a));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
                    mask-image: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                    mask-composite: exclude;
            filter: drop-shadow(0 0 4px var(--home-a)) drop-shadow(0 0 4px var(--away-a));
            opacity: 0.9;
            clip-path: inset(8px 0 0 0 round 58px);
        }

        /* Fila de cada equipo */
        .penalty-row {
            position: relative; z-index: 2;
            display: flex; align-items: center; gap: 8px;
        }
        /* Info del equipo: bandera + dot + nombre */
        .penalty-row .pen-team {
            display: flex; align-items: center; gap: 6px;
            min-width: 130px;
        }
        .penalty-row .pen-team .flag { width: 26px; height: 17px; object-fit: cover; border-radius: 2px; box-shadow: 0 0 0 1px rgba(255,255,255,0.2); }
        .penalty-row .pen-team .dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .penalty-row .pen-team .team-name { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 1.5px; white-space: nowrap; }

        /* Marcador de penales — mismo estilo que .score-box del scoreboard */
        .pen-score {
            background: #00ffc8; color: #000;
            font-size: 22px; font-weight: 900;
            padding: 4px 10px; border-radius: 8px;
            min-width: 32px; text-align: center; line-height: 1;
            flex-shrink: 0;
        }

        /* Celdas de resultados */
        .pen-cells { display: flex; gap: 5px; align-items: center; }

        /* Base: cuadrado blanco con número negro = pendiente */
        .pen-cell {
            width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 900;
            background: #ffffff; color: #000;
            transition: transform 0.25s ease;
        }
        /* Anotado: círculo verde */
        .pen-cell.scored {
            background: #0db54a; color: #000; border-radius: 50%;
            box-shadow: 0 0 7px rgba(13,181,74,0.5);
        }
        /* Fallado / atajado: círculo rojo */
        .pen-cell.missed {
            background: #d6001c; color: #fff; border-radius: 50%;
            box-shadow: 0 0 7px rgba(214,0,28,0.5);
        }
        /* Pendiente activo: cuadrado blanco parpadeante */
        .pen-cell.pending {
            background: #ffffff; color: #000;
            animation: pen-blink 0.8s ease-in-out infinite;
        }
        @keyframes pen-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .pen-cell.pop { animation: pen-pop 0.35s ease; }
        @keyframes pen-pop { 0%{transform:scale(1)} 45%{transform:scale(1.5)} 100%{transform:scale(1)} }
    </style>
</head>
<body>
    <div class="overlay-row">
        <div class="timer-box" id="clock">--:--</div>
        <div class="scoreboard" id="scoreboard">
            <div class="accent-line"></div>
            <div class="teams-container">
                <div class="team">
                    <img class="flag" id="flag-home" src="" alt="">
                    <span class="dot dot-home"></span>
                    <span class="team-name" id="name-home">---</span>
                </div>
                <div class="score-box" id="score-home">0</div>
                <div class="logo-center">
                    <img src="assets/6652f9c0d6bbc.jpeg" alt="FIFA 26">
                </div>
                <div class="score-box" id="score-away">0</div>
                <div class="team">
                    <span class="team-name" id="name-away">---</span>
                    <span class="dot dot-away"></span>
                    <img class="flag" id="flag-away" src="" alt="">
                </div>
            </div>
        </div>
    </div>
    <!-- Slot único debajo del marcador: badge 2do partido > penales > eventos (prioridad) -->
    <div class="below-stack">
        <!-- Badge: segundo partido en vivo -->
        <div id="match2-badge">
            <div class="badge-dot"></div>
            <span id="badge-text"></span>
            <span class="badge-label">otro partido</span>
        </div>

        <!-- Tanda de penales -->
        <div id="penalty-wrap">
            <div class="penalty-board" id="penalty-board">
                <div class="accent-line"></div>
                <div class="penalty-row" data-team="home">
                    <div class="pen-team">
                        <img class="flag" id="pen-flag-home" src="" alt="">
                        <span class="dot dot-home"></span>
                        <span class="team-name" id="pen-name-home">---</span>
                    </div>
                    <div class="pen-score" id="pen-score-home">0</div>
                    <div class="pen-cells" id="pen-cells-home"></div>
                </div>
                <div class="penalty-row" data-team="away">
                    <div class="pen-team">
                        <img class="flag" id="pen-flag-away" src="" alt="">
                        <span class="dot dot-away"></span>
                        <span class="team-name" id="pen-name-away">---</span>
                    </div>
                    <div class="pen-score" id="pen-score-away">0</div>
                    <div class="pen-cells" id="pen-cells-away"></div>
                </div>
            </div>
        </div>

        <div id="event-panel">
            <div class="event-card" id="event-card">
                <div class="event-icon" id="event-icon">⚽</div>
                <div class="event-body">
                    <div class="event-title" id="event-title">GOL</div>
                    <div class="event-sub"   id="event-sub">Jugador</div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ══════════════════════════════════════════════════════════════
    //  CONFIGURACIÓN
    //  Todas las llamadas van al BRIDGE (proxy CORS).
    //  Local:   python bridge.py  → http://localhost:8001
    //  Render:  reemplazá BRIDGE_URL con tu URL de Render
    //  OBS:     agregar como "Browser Source"
    // ══════════════════════════════════════════════════════════════
    // ▼▼▼ Cambiá esta URL por la de tu bridge en Render ▼▼▼
    const BRIDGE_URL = 'https://overlay-mundial.onrender.com';
    // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

    // Bridges a probar en orden: local (si estás corriendo bridge.py) y Render.
    // En producción (GitHub Pages) el intento al bridge local falla casi
    // instantáneamente (connection refused) y se pasa al siguiente.
    const LOCAL_BRIDGE = 'http://localhost:8001';

    const CONFIG = {
        autoMatch:        true,
        matchId:          '',       // se llena automático; o pon un ID manual
        pollIntervalMs:   5000,
        eventDurationMs:  6000,
        useFullNames:     false,

    // ── COUNTRY MAP ──────────────────────────────────────────────

        'Bélgica':['be','BEL'],'Belgium':['be','BEL'],
        'Italia':['it','ITA'],'Italy':['it','ITA'],
        'Croacia':['hr','CRO'],'Croatia':['hr','CRO'],

        'Egipto':['eg','EGY'],'Egypt':['eg','EGY'],
        'Argelia':['dz','ALG'],'Algeria':['dz','ALG'],
        'Costa de Marfil':['ci','CIV'],'Ivory Coast':['ci','CIV'],
        'Sudáfrica':['za','RSA'],'South Africa':['za','RSA'],
        'Arabia Saudita':['sa','KSA'],'Saudi Arabia':['sa','KSA'],
        'Irán':['ir','IRN'],'Iran':['ir','IRN'],
        'Catar':['qa','QAT'],'Qatar':['qa','QAT'],
        'Australia':['au','AUS'],'Nueva Zelanda':['nz','NZL'],'New Zealand':['nz','NZL'],
        'Polonia':['pl','POL'],'Poland':['pl','POL'],
        'Suiza':['ch','SUI'],'Switzerland':['ch','SUI'],
        'Dinamarca':['dk','DEN'],'Denmark':['dk','DEN'],
        'Suecia':['se','SWE'],'Sweden':['se','SWE'],
        'Noruega':['no','NOR'],'Norway':['no','NOR'],
        'Austria':['at','AUT'],'Serbia':['rs','SRB'],
        'Ucrania':['ua','UKR'],'Ukraine':['ua','UKR'],
        'República Checa':['cz','CZE'],'Czech Republic':['cz','CZE'],
        'Gales':['gb-wls','WAL'],'Wales':['gb-wls','WAL'],

        'Turquía':['tr','TUR'],'Turkey':['tr','TUR'],

    // ── TANDA DE PENALES ─────────────────────────────────────────
    const PENALTY_NORMAL_ROUNDS = 5;

    const penaltyState = {
        home: { iso:'', rounds:[], name:'' },   // rounds: 'scored'|'missed'
        away: { iso:'', rounds:[], name:'' },
        active: false,
        _finished: false,
        matchId: null,   // a qué partido pertenece la tanda activa
    };

    const penScore = side => penaltyState[side].rounds.filter(r => r === 'scored').length;

    // Home siempre va primero en cada ronda.
    // hLen == aLen → turno de home; hLen > aLen → turno de away.
    function penWhoseTurn() {
        return penaltyState.home.rounds.length <= penaltyState.away.rounds.length ? 'home' : 'away';
    }

    // Devuelve el código del equipo ganador o null si la tanda sigue.
    // Regla: nunca declarar ganador en mitad de una ronda salvo que sea
    // matemáticamente imposible para el rival.
    // En muerte súbita: esperar siempre el tiro de away antes de decidir.
    function penCheckWinner() {
        const hR = penaltyState.home.rounds, aR = penaltyState.away.rounds;
        const hL = hR.length, aL = aR.length;
        const hs = penScore('home'), as = penScore('away');

        // ── Rondas normales ──────────────────────────────────────
        if (hL <= PENALTY_NORMAL_ROUNDS && aL <= PENALTY_NORMAL_ROUNDS) {
            const aRemain = PENALTY_NORMAL_ROUNDS - aL;
            const hRemain = PENALTY_NORMAL_ROUNDS - hL;
            if (hL === aL + 1) {
                // Home pateó, away aún no en esta ronda
                if (hs > as + aRemain) return penaltyState.home.iso;
                return null;
            }
            if (hL === aL && hL > 0) {
                if (hs > as + aRemain) return penaltyState.home.iso;
                if (as > hs + hRemain) return penaltyState.away.iso;
                if (hL >= PENALTY_NORMAL_ROUNDS && aL >= PENALTY_NORMAL_ROUNDS) {
                    if (hs > as) return penaltyState.home.iso;
                    if (as > hs) return penaltyState.away.iso;
                    // Empate → muerte súbita
                }
            }
            return null;
        }

        // ── Muerte súbita ────────────────────────────────────────
        if (hL === aL + 1) return null; // esperar tiro de away
        if (hL === aL && hL > PENALTY_NORMAL_ROUNDS) {
            const idx = hL - 1;
            const hLast = hR[idx], aLast = aR[idx];
            if (hLast === 'scored' && aLast === 'missed') return penaltyState.home.iso;
            if (aLast === 'scored' && hLast === 'missed') return penaltyState.away.iso;
        }
        return null;
    }

    function renderPenaltyCells(side, animateLast) {
        const el = $(`pen-cells-${side}`);
        const rounds = penaltyState[side].rounds;
        const turn = penWhoseTurn();
        let html = '';

        // Separador visual entre rondas normales y muerte súbita
        rounds.forEach((r, i) => {
            if (i === PENALTY_NORMAL_ROUNDS) html += `<div class="pen-cell" style="width:2px;height:20px;background:rgba(255,255,255,.25);border-radius:2px;flex-shrink:0;"></div>`;
            const isLast = animateLast && i === rounds.length - 1;
            const cls = r === 'scored' ? 'scored' : 'missed';
            html += `<div class="pen-cell ${cls}${isLast ? ' pop' : ''}"></div>`;
        });

        // Celda pendiente: SOLO si la tanda no terminó y es el turno de este equipo
        if (!penaltyState._finished && turn === side) {
            const nextNum = rounds.length + 1;
            if (rounds.length === PENALTY_NORMAL_ROUNDS) html += `<div class="pen-cell" style="width:2px;height:20px;background:rgba(255,255,255,.25);border-radius:2px;flex-shrink:0;"></div>`;
            html += `<div class="pen-cell pending">${nextNum}</div>`;
        }

        el.innerHTML = html;
    }

    function renderPenaltyBoard(animateSide) {
        // Evaluar ganador ANTES de renderizar celdas para que _finished
        // esté correcto y la celda pendiente no aparezca al terminar.
        const winner = penCheckWinner();
        if (winner) {
            penaltyState._finished = true;
        }
        $('pen-score-home').textContent = penScore('home');
        $('pen-score-away').textContent = penScore('away');
        renderPenaltyCells('home', animateSide==='home');
        renderPenaltyCells('away', animateSide==='away');
    }

    function applyPenaltyColors(hIso, aIso) {
        const board = $('penalty-board');
        const [ha,hb] = flagAccents(hIso);
        const [aa,ab] = flagAccents(aIso);
        board.style.setProperty('--home-a', ha);

    // API pública: window.PenaltyShootout
    // .start(homeIso, homeCode, awayIso, awayCode)
    // .kick('home'|'away', 'scored'|'missed')
    // .undo('home'|'away')
    // .reset()  .show()  .hide()
    const PenaltyShootout = {
        start(homeIso, homeCode, awayIso, awayCode) {
            penaltyState.home = { iso:homeIso, rounds:[] };
            penaltyState.away = { iso:awayIso, rounds:[] };
            penaltyState.active = true;
            penaltyState._finished = false;
            setFlag($('pen-flag-home'), homeIso);
            setFlag($('pen-flag-away'), awayIso);
            $('pen-name-home').textContent = homeCode || '---';
            $('pen-name-away').textContent = awayCode || '---';
            applyPenaltyColors(homeIso, awayIso);
            renderPenaltyBoard();
            $('penalty-wrap').classList.add('visible');
            applyStackPriority();
        },
        kick(side, result) {
            if (!penaltyState.active || !penaltyState[side]) return;
            penaltyState[side].rounds.push(result === 'scored' ? 'scored' : 'missed');
            renderPenaltyBoard(side);
        },
        undo(side) {
            if (!penaltyState[side]) return;
            penaltyState[side].rounds.pop();
            penaltyState._finished = false;
            renderPenaltyBoard();
        },
        reset() {
            penaltyState.home.rounds = [];
            penaltyState.away.rounds = [];
            penaltyState._finished = false;
            renderPenaltyBoard();
        },
        show() { penaltyState.active = true;  $('penalty-wrap').classList.add('visible');    renderPenaltyBoard(); applyStackPriority(); },
        hide() { penaltyState.active = false; penaltyState.matchId = null; $('penalty-wrap').classList.remove('visible'); applyStackPriority(); },
    };
    window.PenaltyShootout = PenaltyShootout;

    // Sincroniza automáticamente la tanda desde los datos de la API.
    // Se llama en cada poll si el partido tiene penaltyShootout en el detalle.
    function syncPenaltyFromAPI(m) {
        const ps = m._penaltyShootout;

        // Sin datos de tanda para ESTE partido: si el panel seguía visible
        // de un partido anterior (típicamente porque pasamos al siguiente
        // partido tras un cierre por penales), hay que ocultarlo.
        if (!ps || !Array.isArray(ps.shots) || ps.shots.length === 0) {
            if (penaltyState.active && penaltyState.matchId !== m.id) {
                PenaltyShootout.hide();
            }
            return;
        }

        const [hIso, hCode] = flagInfo(m.homeTeam.name);
        const [aIso, aCode] = flagInfo(m.awayTeam.name);
        const hn = CONFIG.useFullNames ? m.homeTeam.name : hCode;
        const an = CONFIG.useFullNames ? m.awayTeam.name : aCode;

        // (Re)inicializar el panel si no está activo o si pertenece a OTRO
        // partido (p. ej. la ronda anterior también se fue a penales).
        if (!penaltyState.active || penaltyState.matchId !== m.id) {
            penaltyState.home = { iso: hIso, rounds: [], name: hn };
            penaltyState.away = { iso: aIso, rounds: [], name: an };
            penaltyState.active = true;
            penaltyState._finished = false;
            penaltyState.matchId = m.id;
            setFlag($('pen-flag-home'), hIso);
            setFlag($('pen-flag-away'), aIso);
            $('pen-name-home').textContent = hn;
            $('pen-name-away').textContent = an;
            applyPenaltyColors(hIso, aIso);
            $('penalty-wrap').classList.add('visible');
        }

        // Reconstruir rondas desde el array de shots (formato string: scored|missed)
        penaltyState.home.rounds = ps.shots
            .filter(s => s.teamSide === 'home')
            .sort((a, b) => a.order - b.order)
            .map(s => s.outcome === 'goal' ? 'scored' : 'missed');

        penaltyState.away.rounds = ps.shots
            .filter(s => s.teamSide === 'away')
            .sort((a, b) => a.order - b.order)
            .map(s => s.outcome === 'goal' ? 'scored' : 'missed');

        // La tanda termino si el partido ya esta finalizado
        penaltyState._finished = (m.status === 'finished');

        renderPenaltyBoard();
        applyStackPriority();

        // Animación de ganador (solo una vez por partido)
        checkPenaltyWinnerEvent(m, hn, an);
    }

    // ── AUDIO (desactivado) ──────────────────────────────────────
    const SFX = { goal(){}, yellowCard(){}, redCard(){}, halfTime(){}, fullTime(){}, roundWin(){} };

    // Dispara la animación "ha pasado a la siguiente ronda" una sola vez
    // por partido, en cuanto la tanda de penales determina un ganador.
    function checkPenaltyWinnerEvent(m, hn, an) {
        const fired = getFired(m.id);
        if (fired.penWinner) return;

        const winnerIso = penCheckWinner();
        if (!winnerIso) return;

        fired.penWinner = true;
        const isHome = winnerIso === penaltyState.home.iso;
        const winnerName = isHome ? hn : an;
        const hs = penScore('home'), as = penScore('away');

        showEvent({
            type: 'penalty-winner',
            iconFlag: winnerIso,
            title: `¡${winnerName} HA PASADO A LA SIGUIENTE RONDA!`,
            sub: `Tanda de penales: ${hs} — ${as}`,
            sfx: SFX.roundWin,
            flash: 'flash-win',
        });
    }

    // ── UI REFS ──────────────────────────────────────────────────
    const $  = id => document.getElementById(id);
    const sb = $('scoreboard');
    const ui = { clock:$('clock'), nameHome:$('name-home'), nameAway:$('name-away'),
                 scoreHome:$('score-home'), scoreAway:$('score-away'),
                 flagHome:$('flag-home'), flagAway:$('flag-away') };

    function pulse(el) { el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); setTimeout(()=>el.classList.remove('pulse'),500); }

    let evTimer = null;
    function showEvent({type,icon,iconFlag,title,sub,sfx,flash}) {
        if(evTimer) clearTimeout(evTimer);
        sb.className='scoreboard'; void sb.offsetWidth; if(flash) sb.classList.add(flash);

        const p=$('event-panel'); p.classList.remove('visible'); void p.offsetWidth; p.classList.add('visible');
        applyStackPriority();
        evTimer=setTimeout(()=>{ p.classList.remove('visible'); sb.classList.remove(flash); applyStackPriority(); }, CONFIG.eventDurationMs);
    }

    // ── PRIORIDAD DEL SLOT ÚNICO DEBAJO DEL MARCADOR ──────────────
    // Orden: 1) badge de 2do partido, 2) tanda de penales, 3) animaciones
    // de eventos (goles/tarjetas/HT). Mientras hay penales activos no debería
    // haber más animaciones que la de fin de partido (ya suprimida arriba).
    function applyStackPriority() {
        const badgeEl   = $('match2-badge');
        const penaltyEl = $('penalty-wrap');
        const eventEl   = $('event-panel');

        const badgeOn   = badgeEl.classList.contains('visible');
        const penaltyOn = penaltyState.active && penaltyEl.classList.contains('visible');

        // Reset: dejar que cada uno controle su propia visibilidad otra vez
        badgeEl.style.display = '';
        penaltyEl.style.removeProperty('display');
        eventEl.style.removeProperty('display');

        if (badgeOn) {
            penaltyEl.style.display = 'none';
            eventEl.style.display   = 'none';
        } else if (penaltyOn) {
            eventEl.style.display = 'none';
        }
    }

    // ── ESTADO ───────────────────────────────────────────────────
    // ── ESTADO ───────────────────────────────────────────────────
    const firedMap = {};
    function getFired(id) {
        if(!firedMap[id]) firedMap[id] = { goalKeys:new Set(), yH:0,yA:0, rH:0,rA:0, ht:false, eht:false, ft:false, penWinner:false };
        return firedMap[id];
    }
    let state = { homeName:'---',awayName:'---',homeId:'',awayId:'', ready:false };

    // ── ROTACIÓN DE PARTIDOS ──────────────────────────────────────
    const rotation = {
        matches:     [],      // hasta 2 partidos live
        index:       0,       // cuál está en pantalla
        _timer:      null,
        _readyMap:   {},      // { [matchId]: bool }
        _lastGoal:   {},      // { [matchId]: total goles último poll }
        _priorityId: null,    // id con prioridad por gol reciente
        _priorityUntil: 0,
        PRIORITY_MS: 30000,   // 30s de prioridad tras gol
        ROTATE_MS:   20000,   // alternancia normal cada 20s
    };

    function matchUrgency(m) {
        return (m.minute ?? 0) + ((m.homeScore ?? 0) + (m.awayScore ?? 0)) * 15;
    }

    function highPriorityIndex() {
        if(rotation.matches.length < 2) return 0;
        if(rotation._priorityId && Date.now() < rotation._priorityUntil) {
            const idx = rotation.matches.findIndex(m => m.id === rotation._priorityId);
            if(idx >= 0) return idx;
        }
        const [a, b] = rotation.matches;
        const ua = matchUrgency(a), ub = matchUrgency(b);
        if(Math.abs(ua - ub) > 10) return ua > ub ? 0 : 1;
        return rotation.index;
    }

    function checkGoalPriority() {
        rotation.matches.forEach(m => {
            const prev  = rotation._lastGoal[m.id] ?? -1;
            const total = (m.homeScore ?? 0) + (m.awayScore ?? 0);
            if(prev >= 0 && total > prev) {
                rotation._priorityId    = m.id;
                rotation._priorityUntil = Date.now() + rotation.PRIORITY_MS;
                console.info(`⚽ Gol → prioridad a ${m.homeTeam.name} vs ${m.awayTeam.name} por ${rotation.PRIORITY_MS/1000}s`);
            }
            rotation._lastGoal[m.id] = total;
        });
    }

    function rotateTo(idx, animate = true) {
        if(rotation.matches.length < 2) return;
        idx = ((idx % rotation.matches.length) + rotation.matches.length) % rotation.matches.length;
        if(idx === rotation.index && animate) return;
        rotation.index = idx;
        if(!animate) { renderMatch(rotation.matches[idx]); updateBadge(); return; }
        row.classList.add('fading');
        setTimeout(() => { renderMatch(rotation.matches[idx]); updateBadge(); row.classList.remove('fading'); }, 420);
    }

    function startRotation() {
        if(rotation._timer) clearInterval(rotation._timer);
        rotation._timer = setInterval(() => {
            if(rotation.matches.length < 2) return;
            const best = highPriorityIndex();
            best !== rotation.index ? rotateTo(best) : rotateTo(rotation.index + 1);
        }, rotation.ROTATE_MS);
    }

    function stopRotation() {
        if(rotation._timer) { clearInterval(rotation._timer); rotation._timer = null; }
    }

    function updateBadge() {
        const badge = document.getElementById('match2-badge');
        const txt   = document.getElementById('badge-text');
        if(rotation.matches.length < 2) { badge.classList.remove('visible'); applyStackPriority(); return; }
        const other = rotation.matches[rotation.index === 0 ? 1 : 0];
        if(!other) return;
        const [,hCode] = flagInfo(other.homeTeam.name);
        const [,aCode] = flagInfo(other.awayTeam.name);
        const hn = CONFIG.useFullNames ? other.homeTeam.name : hCode;
        const an = CONFIG.useFullNames ? other.awayTeam.name : aCode;
        txt.innerHTML = `${hn} <span class="badge-score">${other.homeScore??0}–${other.awayScore??0}</span> ${an}`;
        badge.classList.add('visible');
        applyStackPriority();
    }

    // ── SEGUNDOS EN TIEMPO REAL ──────────────────────────────────
    // La API solo devuelve minutos. Simulamos los segundos localmente:
    // cuando la API reporta un minuto nuevo, reiniciamos el contador a 0
    // y un setInterval de 1 s lo incrementa hasta 59 entre cada poll.
    const liveSeconds = {
        minute: null,
        addedMinute: null,
        seconds: 0,
        isLive: false,
        _tick: null,
        _anchorTs: null,    // Date.now() cuando se fijó el minuto actual
        _anchorSec: 0,      // segundos al momento del ancla
    };

    function startSecondsTick() {
        if(liveSeconds._tick) return;
        liveSeconds._tick = setInterval(() => {
            if(!liveSeconds.isLive || liveSeconds._anchorTs == null) return;
            // Calcular segundos reales transcurridos desde el ancla
            const elapsed = Math.floor((Date.now() - liveSeconds._anchorTs) / 1000);
            liveSeconds.seconds = Math.min(liveSeconds._anchorSec + elapsed, 59);
            const sec = String(liveSeconds.seconds).padStart(2, '0');
            const min = String(liveSeconds.minute).padStart(2, '0');
            ui.clock.textContent = liveSeconds.addedMinute
                ? `${min}+${liveSeconds.addedMinute}:${sec}`
                : `${min}:${sec}`;
        }, 500); // poll cada 500ms para mayor precisión sin ser costoso
    }

    function updateLiveSeconds(m) {
        const per = (m.period||'').toString().trim().toUpperCase();
        if(m.status !== 'live' || per === 'HT' || per === 'EHT' || m.minute == null) {
            liveSeconds.isLive = false;
            return;
        }
        liveSeconds.isLive = true;
        startSecondsTick();
        if(m.minute !== liveSeconds.minute || m.addedMinute !== liveSeconds.addedMinute) {
            liveSeconds.minute      = m.minute;
            liveSeconds.addedMinute = m.addedMinute ?? null;
            liveSeconds.seconds     = 0;
            liveSeconds._anchorTs   = Date.now();
            liveSeconds._anchorSec  = 0;
        }
    }


    // ── EVENTOS ──────────────────────────────────────────────────
    // Usa m._events[] poblado por enrichLiveMatch desde /detail/:id
    // Estructura real: {minute, type:"goal"|"goal-own"|"yellow"|"red",
    //                   team:"home"|"away", playerName, playerNameFull, assist, assistFull}

    function checkEvents(m) {
        const fired = getFired(m.id);
        if(!rotation._readyMap[m.id]) return;
        const [,hCode] = flagInfo(m.homeTeam.name);
        const [,aCode] = flagInfo(m.awayTeam.name);
        const hn = CONFIG.useFullNames ? m.homeTeam.name : hCode;
        const an = CONFIG.useFullNames ? m.awayTeam.name : aCode;

        // Minuto actual del partido
        const currentMinute = m.minute ?? null;

        (m._events||[]).forEach(ev => {
            const key = `${ev.type}-${ev.team}-${ev.minute}-${ev.addedMinute||0}-${ev.playerName||''}`;
            if(fired.goalKeys.has(key)) return;
            fired.goalKeys.add(key);

            // Validar que el evento ocurrió cerca del minuto actual.
            // Si el evento es más de 2 minutos anterior al minuto actual del partido,
            // significa que ya había pasado antes de esta sesión → ignorar.
            // Margen de +2 para cubrir el lag de la API (el evento puede llegar
            // 1-2 polls después de que realmente ocurrió).
            if(currentMinute != null && ev.minute != null) {
                const diff = currentMinute - ev.minute;
                if(diff > 2) {
                    console.log(`⏩ Evento ignorado (min ${ev.minute} vs actual ${currentMinute}): ${key}`);
                    return;
                }
            }

            const teamName  = ev.team==='home' ? hn : an;
            const opponent  = ev.team==='home' ? an : hn;
            const player    = ev.playerNameFull || ev.playerName || '';
            const minLabel  = ev.minute != null
                ? (ev.addedMinute ? `${ev.minute}+${ev.addedMinute}'` : `${ev.minute}'`)
                : '';
            const minStr    = minLabel ? ` — ${minLabel}` : '';
            const assistStr = ev.assist ? ` (Ast: ${ev.assistFull||ev.assist})` : '';

            if(ev.type==='goal') {
                showEvent({type:'goal', icon:'⚽',
                    title:`¡GOL! ${teamName}`,
                    sub:`${player}${minStr}${assistStr}`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='goal-own') {
                showEvent({type:'goal', icon:'⚽',
                    title:`¡GOL EN CONTRA! ${opponent}`,
                    sub:`${player}${minStr} (en propia)`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='yellow') {
                showEvent({type:'yellow', icon:'🟨',
                    title:'TARJETA AMARILLA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.yellowCard, flash:'flash-card'});
            } else if(ev.type==='red') {
                showEvent({type:'red', icon:'🟥',
                    title:'TARJETA ROJA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.redCard, flash:'flash-card'});
            }
        });

        // Medio tiempo
        const per = (m.period||'').toString().trim().toUpperCase();
        if(!fired.ht && per==='HT') {
            fired.ht=true;
            showEvent({type:'halftime', icon:'⏸️', title:'MEDIO TIEMPO',
                sub:`${hn} ${m.homeScore??0} — ${m.awayScore??0} ${an}`,
                sfx:SFX.halfTime, flash:'flash-ht'});
        }

        // Medio tiempo de la prórroga (Extra Half Time)
        if(!fired.eht && per==='EHT') {
            fired.eht=true;
            showEvent({type:'halftime', icon:'⏸️', title:'DESCANSO PRÓRROGA',
                sub:`${hn} ${m.homeScore??0} — ${m.awayScore??0} ${an}`,
                sfx:SFX.halfTime, flash:'flash-ht'});
        }

        // Final
        if(!fired.ft && m.status==='finished' && !penaltyState.active) {
            fired.ft=true;
            showEvent({type:'fulltime', icon:'🏁', title:'FIN DEL PARTIDO',
                sub:`${hn} ${m.homeScore??0} — ${m.awayScore??0} ${an}`,
                sfx:SFX.fullTime, flash:'flash-ft'});
        }
    }

    // ── AUTO-SCALE ───────────────────────────────────────────────
    // Ajusta dinámicamente todos los tamaños según la longitud combinada
    // de los nombres de los equipos, sin equipos predefinidos.
    function autoScale(homeName, awayName) {
        // Longitud total de caracteres (ambos equipos)
        const totalChars = (homeName || '').length + (awayName || '').length;

        // Definir breakpoints: [maxChars, escala]
        // escala 1.0 = tamaños base originales
        let scale;
        if      (totalChars <=  8) scale = 1.15;  // nombres muy cortos (BRA, ARG)
        else if (totalChars <= 12) scale = 1.0;   // nombres cortos normales
        else if (totalChars <= 16) scale = 0.88;  // nombres medianos
        else if (totalChars <= 20) scale = 0.78;  // nombres largos
        else if (totalChars <= 26) scale = 0.68;  // nombres muy largos
        else                       scale = 0.58;  // extremadamente largos

        const r = document.querySelector('.overlay-row');
        const s = v => `${Math.round(v * scale)}px`;
        const f = v => `${(v * scale).toFixed(1)}px`;

        // Fuentes
        r.style.setProperty('--team-font',   f(26));
        r.style.setProperty('--score-font',  f(34));
        r.style.setProperty('--timer-font',  f(22));

        // Gaps y tamaños
        r.style.setProperty('--team-gap',    s(8));
        r.style.setProperty('--dot-size',    s(10));
        r.style.setProperty('--flag-w',      s(34));
        r.style.setProperty('--flag-h',      s(22));

        // Score box
        r.style.setProperty('--score-pad-v',    s(10));
        r.style.setProperty('--score-pad-h',    s(14));
        r.style.setProperty('--score-min-w',    s(44));
        r.style.setProperty('--score-margin-v', `-${s(13).replace('px','')}px`);
        r.style.setProperty('--score-overlap',  `-${s(8).replace('px','')}px`);

        // Logo central
        r.style.setProperty('--logo-h',       s(58));
        r.style.setProperty('--logo-pad-v',   s(8));
        r.style.setProperty('--logo-pad-h',   s(10));
        r.style.setProperty('--logo-margin',  `-${s(16).replace('px','')}px`);

        // Timer / reloj
        r.style.setProperty('--timer-pad-v',      s(8));
        r.style.setProperty('--timer-pad-r',      s(32));
        r.style.setProperty('--timer-pad-l',      s(20));
        r.style.setProperty('--timer-min-w',      s(60));
        r.style.setProperty('--timer-overlap',    `-${s(26).replace('px','')}px`);

        // Scoreboard padding
        r.style.setProperty('--sb-pad-v',  s(8));
        r.style.setProperty('--sb-pad-h',  s(28));
    }

    // ── SCOREBOARD UI ────────────────────────────────────────────
    // Convierte una fecha a su string YYYY-MM-DD en hora Argentina (UTC-3),
    // para poder comparar el día del partido con el de hoy.
    function arDateStr(d) {
        // en-CA da formato YYYY-MM-DD. Usar timeZone explícito evita depender
        // de la zona horaria del sistema donde corre el navegador/OBS: antes
        // la fórmula manual asumía que la máquina estaba en UTC+0, y si el
        // reloj local está en otro huso (ej. Colombia UTC-5) el cálculo de
        // "hoy" quedaba desfasado varias horas, mostrando "Mañana" en
        // partidos que en Argentina ya eran de hoy.
        return new Date(d).toLocaleDateString('en-CA', { timeZone: 'America/Argentina/Buenos_Aires' });
    }

    function formatClock(m) {
        const per = (m.period||'').toString().trim().toUpperCase();
        if(m.status==='live') {
            if(per==='HT') return 'MT';
            if(per==='EHT') return 'MT PR';
            if(m.minute!=null) {
                const sec = String(liveSeconds.isLive && liveSeconds.minute === m.minute ? liveSeconds.seconds : 0).padStart(2, '0');
                const min = String(m.minute).padStart(2, '0');
                return m.addedMinute
                    ? `${min}+${m.addedMinute}:${sec}`
                    : `${min}:${sec}`;
            }
            return 'EN VIVO';
        }
        if(m.status==='finished')  return penaltyState.active ? 'PEN' : 'FT';
        if(m.status==='postponed') return 'SUSP';

        // Partido todavía no empezó: si es de otro día (hora Argentina),
        // anteponemos "Mañana"/"Pasado mañana" o la fecha, en vez de solo la hora.
        const start    = new Date(m.startTime);
        const hora     = start.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        const matchDay = arDateStr(start);
        const today    = arDateStr(new Date());

        if(matchDay === today) return hora;

        const diffDias = Math.round((new Date(matchDay) - new Date(today)) / 86400000);
        if(diffDias === 1) return `Mañana ${hora}`;
        if(diffDias === 2) return `Pasado mañana ${hora}`;

        // Más de dos días de diferencia (no debería pasar salvo algo raro): mostrar fecha corta
        const [, mo, da] = matchDay.split('-');
        return `${da}/${mo} ${hora}`;
    }

    function renderMatch(m) {
        const [hIso,hCode] = flagInfo(m.homeTeam.name);
        const [aIso,aCode] = flagInfo(m.awayTeam.name);
        const hn = CONFIG.useFullNames ? m.homeTeam.name : hCode;
        const an = CONFIG.useFullNames ? m.awayTeam.name : aCode;

        // Ajustar tamaños automáticamente según los nombres reales
        autoScale(hn, an);

        ui.nameHome.textContent = hn;
        ui.nameAway.textContent = an;
        setFlag(ui.flagHome, hIso);
        setFlag(ui.flagAway, aIso);
        applyTeamColors(hIso, aIso);

        updateLiveSeconds(m);
        const clk = formatClock(m);
        if(ui.clock.textContent!==clk) ui.clock.textContent=clk;

        const hs=String(m.homeScore??0), as=String(m.awayScore??0);
        if(ui.scoreHome.textContent!==hs){ ui.scoreHome.textContent=hs; if(state.ready) pulse(ui.scoreHome); }
        if(ui.scoreAway.textContent!==as){ ui.scoreAway.textContent=as; if(state.ready) pulse(ui.scoreAway); }

        state.homeName=hn; state.awayName=an;
        state.homeId=m.homeTeam.id; state.awayId=m.awayTeam.id;
    }

    // ── FETCH SCHEDULE → extraer partido del Mundial ─────────────
    //
    //  FLUJO:
    //  1. GET /match del bridge → partidos ayer+hoy+mañana en 1 request
    //  2. Filtrar tournamentCalendarSlug contiene 'world-cup'
    //  3. Elegir el mejor (live > próximo > último terminado)
    //  4. Si está live → GET /detail/:id → score, minuto, eventos (goles, tarjetas)
    //
    function pickBest(matches) {
        const now = Date.now();
        const SLOT_WINDOW_MS = 10 * 60 * 1000;

        // OJO: el endpoint de schedule (lista) a veces reporta un status distinto
        // de 'live' durante cortes de partido (ET, descanso de prórroga, etc.).
        // Para no perder el partido de la rotación en esos cortes, se considera
        // "en curso" a todo lo que no esté explícitamente finalizado/suspendido
        // y ya haya arrancado.
        const live = matches.filter(m => {
            if(m.status==='live') return true;
            if(m.status==='finished' || m.status==='postponed') return false;
            const t = new Date(m.startTime).getTime();
            return !isNaN(t) && t<=now;
        });
        if(live.length){ live.sort((a,b)=>(b.minute??0)-(a.minute??0)); return live.slice(0,2); }

        const pending = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t<=now&&(now-t)<=2*60*60*1000);
        if(pending.length){
            pending.sort((a,b)=>b.t-a.t);
            const ref = pending[0].t;
            return pending.filter(({t})=>Math.abs(t-ref)<=SLOT_WINDOW_MS).slice(0,2).map(({m})=>m);
        }

        const upcoming = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t>now);
        if(upcoming.length){
            upcoming.sort((a,b)=>a.t-b.t);
            const ref = upcoming[0].t;
            return upcoming.filter(({t})=>t-ref<=SLOT_WINDOW_MS).slice(0,2).map(({m})=>m);
        }

        const finished = matches
            .filter(m=>m.status==='finished')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t));
        if(finished.length){ finished.sort((a,b)=>b.t-a.t); return [finished[0].m]; }
        return [];
    }

    // Fechas en hora Argentina (UTC-3) — mismo criterio que elnine para indexar partidos
    function arDates() {
        // Mismo fix que arDateStr: usar timeZone explícito en vez de la
        // fórmula manual que asumía navegador en UTC+0.
        const now = new Date();
        const y = new Date(now); y.setDate(now.getDate()-1);
        const t = new Date(now); t.setDate(now.getDate()+1);
        return [arDateStr(y), arDateStr(now), arDateStr(t)];
    }

    // Llama directamente a elnine (funciona desde el browser, CORS está abierto)
    async function fetchScheduleDate(dateStr) {
        const url = `https://api.elnine.com.ar/schedule?date=${dateStr}&_t=${Date.now()}`;
        const r = await fetch(url, {cache:'no-store'});
        if(!r.ok) throw new Error(`elnine HTTP ${r.status}`);
        return (await r.json()).matches || [];
    }

    // Fetch directo a elnine para las 3 fechas en paralelo (estrategia principal)
    async function fetchAllDirect() {
        const dates = arDates();
        const results = await Promise.allSettled(dates.map(d => fetchScheduleDate(d)));
        const seen = new Set(), all = [];
        let okCount = 0;
        results.forEach((r, i) => {
            if(r.status==='fulfilled') {
                okCount++;
                for(const m of r.value) {
                    if(!seen.has(m.id)){ seen.add(m.id); all.push(m); }
                }
            } else {
                console.warn(`⚠️ fetchScheduleDate(${dates[i]}) falló:`, r.reason);
            }
        });
        // Si NINGUNA fecha pudo consultarse (CORS, red, etc.), no confiar en
        // "all=[]" como si fuera un resultado real — forzar fallback al bridge.
        if(okCount === 0) {
            throw new Error('fetchAllDirect: las 3 fechas fallaron (ver warnings arriba)');
        }
        return all;
    }

    // Bridge como fallback (proxy CORS), parametrizado por URL base
    async function fetchAllViaBridge(base) {
        const r = await fetch(`${base}/match?_t=${Date.now()}`, {cache:'no-store'});
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const all = [];
        for(const item of (data.items||[])) {
            for(const m of (item.matches||[])) all.push(m);
        }
        return all;
    }

    // Intenta, en orden: bridge local → elnine directo → bridge de Render.
    // El primero que responda sin lanzar error (incluso con 0 partidos
    // legítimos) gana. Errores (CORS, connection refused, etc.) pasan al siguiente.
    async function fetchAllSmart() {
        const strategies = [
            ['bridge-local',  () => fetchAllViaBridge(LOCAL_BRIDGE)],
            ['elnine-directo', fetchAllDirect],
            ['bridge-render', () => fetchAllViaBridge(BRIDGE_URL)],
        ];
        for(const [name, fn] of strategies) {
            try {
                const all = await fn();
                console.log(`✅ ${name} OK → ${all.length} partidos`);
                return all;
            } catch(e) {
                console.warn(`⚠️ ${name} falló:`, e.message);
            }
        }
        console.error('❌ Todas las fuentes fallaron');
        return [];
    }

    // Enriquece el partido con datos en tiempo real desde elnine /match/:id
    async function enrichLiveMatch(match) {
        // Intentar primero directo a elnine, fallback al bridge
        const urls = [
            `https://api.elnine.com.ar/match/${match.id}?_t=${Date.now()}`,
            `${LOCAL_BRIDGE}/detail/${match.id}?_t=${Date.now()}`,
            `${BRIDGE_URL}/detail/${match.id}?_t=${Date.now()}`,
        ];
        for(const url of urls) {
            try {
                const r = await fetch(url, {cache:'no-store'});
                if(!r.ok) continue;
                const raw = await r.json();
                const d = raw.matchDetail ?? raw;

                match.homeScore    = d.homeTeam?.score   ?? match.homeScore;
                match.awayScore    = d.awayTeam?.score   ?? match.awayScore;
                match.minute       = d.minute             ?? match.minute;
                match.addedMinute  = d.addedMinute        ?? null;
                if(d.period) match.period = d.period;
                if(d.status) match.status = d.status;
                match.homeTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='home').length;
                match.awayTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='away').length;
                match._events = d.events || [];
                if(d.penaltyShootout?.shots?.length) match._penaltyShootout = d.penaltyShootout;
                break; // éxito, salir del loop
            } catch(e) { /* intentar siguiente URL */ }
        }
        return match;
    }

    async function fetchYellowCards(matchId) { /* reemplazado por enrichLiveMatch */ }

    async function poll() {
        try {
            const all = await fetchAllSmart();

            const WC_SLUGS = ['fifa-world-cup','fifa-world-cup-2026','world-cup-2026','world-cup'];
            const isWC = m => {
                const s = (m.tournamentCalendarSlug||'').toLowerCase();
                return WC_SLUGS.some(k=>s===k) || s.includes('world-cup');
            };
            const wc = all.filter(isWC);
            console.log(`📅 ${new Date().toISOString()} | Mundial: ${wc.length} partidos | slugs: ${[...new Set(all.map(m=>m.tournamentCalendarSlug))].join(', ')}`);
            wc.forEach(m=>console.log(`  [${m.status}] ${m.homeTeam.name} vs ${m.awayTeam.name} | ${m.homeScore??'-'}:${m.awayScore??'-'} min:${m.minute??'-'} period:${m.period??'-'}`));

            let picked = CONFIG.autoMatch
                ? pickBest(wc)
                : (wc.find(m=>m.id===CONFIG.matchId) ? [wc.find(m=>m.id===CONFIG.matchId)] : []);

            if(!picked.length){ console.warn('⚠️ No hay partido del Mundial'); return; }

            // Enriquecer partidos en curso en paralelo.
            // Antes solo se enriquecía si m.status==='live', pero durante cortes
            // como el descanso de la prórroga (EHT) el status de la lista puede
            // venir distinto de 'live', y entonces nunca se pedía el detalle
            // que trae el campo "period" real (HT/EHT). Se enriquece siempre
            // que el partido no esté ya finalizado o suspendido.
            picked = await Promise.all(picked.map(m =>
                (m.status!=='finished' && m.status!=='postponed') ? enrichLiveMatch(m) : m
            ));

            const newIds  = picked.map(m=>m.id).sort().join(',');
            const prevIds = rotation.matches.map(m=>m.id).sort().join(',');

            if(newIds !== prevIds) {
                console.info(`🔄 Partidos: ${picked.map(m=>`${m.homeTeam.name} vs ${m.awayTeam.name}`).join(' | ')}`);
                picked.forEach(m => { if(!rotation._readyMap[m.id]) rotation._readyMap[m.id] = false; });

                const currentId = rotation.matches[rotation.index]?.id;
                const newIndex  = picked.findIndex(m => m.id === currentId);
                rotation.matches = picked;
                rotation.index   = newIndex >= 0 ? newIndex : 0;

                picked.length >= 2 ? startRotation() : stopRotation();
            } else {
                picked.forEach((fresh, i) => { rotation.matches[i] = fresh; });
            }

            checkGoalPriority();

            const best = highPriorityIndex();
            if(rotation.matches.length >= 2 && best !== rotation.index) rotateTo(best);

            rotation.matches.forEach((m, i) => {
                if(!rotation._readyMap[m.id]) rotation._readyMap[m.id] = true;
                if(i === rotation.index) { renderMatch(m); updateBadge(); syncPenaltyFromAPI(m); }
                checkEvents(m);
                if(m.status==='live') fetchYellowCards(m.id);
            });

            if(!state.ready) state.ready = true;

        } catch(err) {
            console.error('❌ poll error:', err);
        }
    }

    // ── INIT ─────────────────────────────────────────────────────
    console.log(`🚀 Overlay iniciado | bridges: local=${LOCAL_BRIDGE} render=${BRIDGE_URL}`);
    poll();
    setInterval(poll, CONFIG.pollIntervalMs);
    </script>
