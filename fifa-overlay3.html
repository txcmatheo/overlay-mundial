        .scoreboard::before, .scoreboard::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 58%;
            z-index: 0; pointer-events: none; opacity: 0.16; mix-blend-mode: screen;

        .scoreboard::before {
            left: 0; color: var(--home-a); border-radius: 50px 0 0 50px;
            -webkit-mask-image: linear-gradient(90deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
            -webkit-mask-composite: destination-in;
                    mask-image: linear-gradient(90deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
                    mask-composite: intersect;
        }
        .scoreboard::after {
            right: 0; color: var(--away-a); border-radius: 0 50px 50px 0;
            -webkit-mask-image: linear-gradient(270deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
            -webkit-mask-composite: destination-in;
                    mask-image: linear-gradient(270deg, #000 55%, transparent 100%),

    // ãã AUDIO (desactivado) ãããããããããããããããããããããããããããããããããããããã

    // ãã UI REFS ãããããããããããããããããããããããããããããããããããããããããããããããããã
    const $  = id => document.getElementById(id);
    const sb = $('scoreboard');
    const ui = { clock:$('clock'), nameHome:$('name-home'), nameAway:$('name-away'),
                 scoreHome:$('score-home'), scoreAway:$('score-away'),
                 flagHome:$('flag-home'), flagAway:$('flag-away') };

    function pulse(el) { el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); setTimeout(()=>el.classList.remove('pulse'),500); }

    let evTimer = null;
    function showEvent({type,icon,title,sub,sfx,flash}) {
        if(evTimer) clearTimeout(evTimer);
        sb.className='scoreboard'; void sb.offsetWidth; if(flash) sb.classList.add(flash);
        try { if(sfx) sfx(); } catch(e){}

        const p=$('event-panel'); p.classList.remove('visible'); void p.offsetWidth; p.classList.add('visible');

    // ãã ESTADO ããããããããããããããããããããããããããããããããããããããããããããããããããã
    const fired = { goalKeys:new Set(), yH:0,yA:0, rH:0,rA:0, ht:false, ft:false };
    let state = { homeName:'---',awayName:'---',homeId:'',awayId:'', ready:false };


    // ãã EVENTOS ãããããããããããããããããããããããããããããããããããããããããããããããããã
    // Usa m._events[] poblado por enrichLiveMatch desde /detail/:id
    // Estructura real: {minute, type:"goal"|"goal-own"|"yellow"|"red",
    //                   team:"home"|"away", playerName, playerNameFull, assist, assistFull}

    function checkEvents(m) {
        if(!state.ready) return;
        const {homeName:hn, awayName:an} = state;

        // Minuto actual del partido
        const currentMinute = m.minute ?? null;

        (m._events||[]).forEach(ev => {
            const key = `${ev.type}-${ev.team}-${ev.minute}-${ev.addedMinute||0}-${ev.playerName||''}`;
            if(fired.goalKeys.has(key)) return;
            fired.goalKeys.add(key);

            // Validar que el evento ocurriû° cerca del minuto actual.
            // Si el evento es mûÀs de 2 minutos anterior al minuto actual del partido,
            // significa que ya habûÙa pasado antes de esta sesiû°n ã ignorar.
            // Margen de +2 para cubrir el lag de la API (el evento puede llegar
            // 1-2 polls despuûˋs de que realmente ocurriû°).
            if(currentMinute != null && ev.minute != null) {
                const evEffectiveMinute = (ev.minute ?? 0) + (ev.addedMinute ?? 0);
                const diff = currentMinute - evEffectiveMinute;
                if(diff > 2) {
                    console.log(`ãˋ Evento ignorado (min ${ev.minute} vs actual ${currentMinute}): ${key}`);
                    return;
                }
            }

            const teamName  = ev.team==='home' ? hn : an;
            const opponent  = ev.team==='home' ? an : hn;
            const player    = ev.playerNameFull || ev.playerName || '';
            const minLabel  = ev.minute != null
                ? (ev.addedMinute ? `${ev.minute}+${ev.addedMinute}'` : `${ev.minute}'`)
                : '';
            const minStr    = minLabel ? ` ã ${minLabel}` : '';
            const assistStr = ev.assist ? ` (Ast: ${ev.assistFull||ev.assist})` : '';

            if(ev.type==='goal') {
                showEvent({type:'goal', icon:'ã§',
                    title:`ôÀGOL! ${teamName}`,
                    sub:`${player}${minStr}${assistStr}`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='goal-own') {
                showEvent({type:'goal', icon:'ã§',
                    title:`ôÀGOL EN CONTRA! ${opponent}`,
                    sub:`${player}${minStr} (en propia)`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='yellow') {
                showEvent({type:'yellow', icon:'Þ´',
                    title:'TARJETA AMARILLA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.yellowCard, flash:'flash-card'});
            } else if(ev.type==='red') {
                showEvent({type:'red', icon:'ÞË',
                    title:'TARJETA ROJA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.redCard, flash:'flash-card'});
            }
        });

        // Medio tiempo
        if(!fired.ht && m.period==='HT') {
            fired.ht=true;
            showEvent({type:'halftime', icon:'ã¡ÿ¡', title:'MEDIO TIEMPO',
                sub:`${hn} ${m.homeScore??0} ã ${m.awayScore??0} ${an}`,
                sfx:SFX.halfTime, flash:'flash-ht'});
        }

        // Final
        if(!fired.ft && m.status==='finished') {
            fired.ft=true;
            showEvent({type:'fulltime', icon:'Þ', title:'FIN DEL PARTIDO',
                sub:`${hn} ${m.homeScore??0} ã ${m.awayScore??0} ${an}`,
                sfx:SFX.fullTime, flash:'flash-ft'});
        }
    }

    // ãã AUTO-SCALE ããããããããããããããããããããããããããããããããããããããããããããããã
    // Ajusta dinûÀmicamente todos los tamaûÝos segû¤n la longitud combinada
    // de los nombres de los equipos, sin equipos predefinidos.
    function autoScale(homeName, awayName) {
        // Longitud total de caracteres (ambos equipos)
        const totalChars = (homeName || '').length + (awayName || '').length;

        // Definir breakpoints: [maxChars, escala]
        // escala 1.0 = tamaûÝos base originales
        let scale;
        if      (totalChars <=  8) scale = 1.15;  // nombres muy cortos (BRA, ARG)
        else if (totalChars <= 12) scale = 1.0;   // nombres cortos normales
        else if (totalChars <= 16) scale = 0.88;  // nombres medianos
        else if (totalChars <= 20) scale = 0.78;  // nombres largos
        else if (totalChars <= 26) scale = 0.68;  // nombres muy largos
        else                       scale = 0.58;  // extremadamente largos

        const r = document.querySelector('.overlay-row');
        const s = v => `${Math.round(v * scale)}px`;
        const f = v => `${(v * scale).toFixed(1)}px`;

        // Fuentes
        r.style.setProperty('--team-font',   f(26));
        r.style.setProperty('--score-font',  f(34));
        r.style.setProperty('--timer-font',  f(22));

        // Gaps y tamaûÝos
        r.style.setProperty('--team-gap',    s(8));
        r.style.setProperty('--dot-size',    s(10));
        r.style.setProperty('--flag-w',      s(34));
        r.style.setProperty('--flag-h',      s(22));

        // Score box
        r.style.setProperty('--score-pad-v',    s(10));
        r.style.setProperty('--score-pad-h',    s(14));
        r.style.setProperty('--score-min-w',    s(44));
        r.style.setProperty('--score-margin-v', `-${s(13).replace('px','')}px`);
        r.style.setProperty('--score-overlap',  `-${s(8).replace('px','')}px`);

        // Logo central
        r.style.setProperty('--logo-h',       s(58));
        r.style.setProperty('--logo-pad-v',   s(8));
        r.style.setProperty('--logo-pad-h',   s(10));
        r.style.setProperty('--logo-margin',  `-${s(26).replace('px','')}px`);

        // Timer / reloj
        r.style.setProperty('--timer-pad-v',      s(8));
        r.style.setProperty('--timer-pad-r',      s(32));
        r.style.setProperty('--timer-pad-l',      s(20));
        r.style.setProperty('--timer-min-w',      s(60));
        r.style.setProperty('--timer-overlap',    `-${s(26).replace('px','')}px`);

        // Scoreboard padding
        r.style.setProperty('--sb-pad-v',  s(8));
        r.style.setProperty('--sb-pad-h',  s(28));
    }

    // ãã SCOREBOARD UI ãããããããããããããããããããããããããããããããããããããããããããã
    function formatClock(m) {
        if(m.status==='live') {
            if(m.period==='HT') return 'MT';
            if(m.minute!=null) {
                return m.addedMinute ? `${m.minute}+${m.addedMinute}'` : `${m.minute}'`;
            }
            return 'EN VIVO';
        }
        if(m.status==='finished')  return 'FT';
        if(m.status==='postponed') return 'SUSP';
        return new Date(m.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    }

    function renderMatch(m) {
        const [hIso,hCode] = flagInfo(m.homeTeam.name);
        const [aIso,aCode] = flagInfo(m.awayTeam.name);
        const hn = CONFIG.useFullNames ? m.homeTeam.name : hCode;
        const an = CONFIG.useFullNames ? m.awayTeam.name : aCode;

        // Ajustar tamaûÝos automûÀticamente segû¤n los nombres reales
        autoScale(hn, an);

        ui.nameHome.textContent = hn;
        ui.nameAway.textContent = an;
        setFlag(ui.flagHome, hIso);
        setFlag(ui.flagAway, aIso);
        applyTeamColors(hIso, aIso);

        const clk = formatClock(m);
        if(ui.clock.textContent!==clk) ui.clock.textContent=clk;

        const hs=String(m.homeScore??0), as=String(m.awayScore??0);
        if(ui.scoreHome.textContent!==hs){ ui.scoreHome.textContent=hs; if(state.ready) pulse(ui.scoreHome); }
        if(ui.scoreAway.textContent!==as){ ui.scoreAway.textContent=as; if(state.ready) pulse(ui.scoreAway); }

        state.homeName=hn; state.awayName=an;
        state.homeId=m.homeTeam.id; state.awayId=m.awayTeam.id;
    }

    // ãã FETCH SCHEDULE ã extraer partido del Mundial ããããããããããããã
    //
    //  FLUJO:
    //  1. GET /match del bridge ã partidos ayer+hoy+maûÝana en 1 request
    //  2. Filtrar tournamentCalendarSlug contiene 'world-cup'
    //  3. Elegir el mejor (live > prû°ximo > û¤ltimo terminado)
    //  4. Si estûÀ live ã GET /detail/:id ã score, minuto, eventos (goles, tarjetas)
    //
    function pickBest(matches) {
        const now = Date.now();
        const live = matches.filter(m=>m.status==='live');
        if(live.length){ live.sort((a,b)=>(b.minute??0)-(a.minute??0)); return live[0]; }
        const pending = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t<=now&&(now-t)<=2*60*60*1000);
        if(pending.length){ pending.sort((a,b)=>b.t-a.t); return pending[0].m; }
        const upcoming = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t>now);
        if(upcoming.length){ upcoming.sort((a,b)=>a.t-b.t); return upcoming[0].m; }
        // 4. ûltimo partido terminado ã sin lûÙmite de tiempo para no perder
        //    partidos que acaban de terminar (ej: USA vs Paraguay FT)
        const finished = matches
            .filter(m=>m.status==='finished')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t));
        if(finished.length){ finished.sort((a,b)=>b.t-a.t); return finished[0].m; }
        return null;
    }

    // Fechas en hora Argentina (UTC-3) ã mismo criterio que elnine para indexar partidos
    function arDates() {
        const AR_OFFSET = -3 * 60; // minutos
        const now = new Date();
        const toAR = d => { const x = new Date(d); x.setMinutes(x.getMinutes() + AR_OFFSET - x.getTimezoneOffset()); return x; };
        const fmt  = d => toAR(d).toISOString().slice(0,10);
        const y = new Date(now); y.setDate(now.getDate()-1);
        const t = new Date(now); t.setDate(now.getDate()+1);
        return [fmt(y), fmt(now), fmt(t)];
    }

    // Llama directamente a elnine (funciona desde el browser, CORS estûÀ abierto)
    async function fetchScheduleDate(dateStr) {
        const url = `https://api.elnine.com.ar/schedule?date=${dateStr}&_t=${Date.now()}`;
        const r = await fetch(url, {cache:'no-store'});
        if(!r.ok) throw new Error(`elnine HTTP ${r.status}`);
        return (await r.json()).matches || [];
    }

    // Fetch directo a elnine para las 3 fechas en paralelo (estrategia principal)
    async function fetchAllDirect() {
        const dates = arDates();
        const results = await Promise.allSettled(dates.map(d => fetchScheduleDate(d)));
        const seen = new Set(), all = [];
        let okCount = 0;
        results.forEach((r, i) => {
            if(r.status==='fulfilled') {
                okCount++;
                for(const m of r.value) {
                    if(!seen.has(m.id)){ seen.add(m.id); all.push(m); }
                }
            } else {
                console.warn(`ã ÿ¡ fetchScheduleDate(${dates[i]}) fallû°:`, r.reason);
            }
        });
        // Si NINGUNA fecha pudo consultarse (CORS, red, etc.), no confiar en
        // "all=[]" como si fuera un resultado real ã forzar fallback al bridge.
        if(okCount === 0) {
            throw new Error('fetchAllDirect: las 3 fechas fallaron (ver warnings arriba)');
        }
        return all;
    }

    // Bridge como fallback (proxy CORS), parametrizado por URL base
    async function fetchAllViaBridge(base) {
        const r = await fetch(`${base}/match?_t=${Date.now()}`, {cache:'no-store'});
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const all = [];
        for(const item of (data.items||[])) {
            for(const m of (item.matches||[])) all.push(m);
        }
        return all;
    }

    // Intenta, en orden: bridge local ã elnine directo ã bridge de Render.
    // El primero que responda sin lanzar error (incluso con 0 partidos
    // legûÙtimos) gana. Errores (CORS, connection refused, etc.) pasan al siguiente.
    async function fetchAllSmart() {
        const strategies = [
            ['bridge-local',  () => fetchAllViaBridge(LOCAL_BRIDGE)],
            ['elnine-directo', fetchAllDirect],
            ['bridge-render', () => fetchAllViaBridge(BRIDGE_URL)],
        ];
        for(const [name, fn] of strategies) {
            try {
                const all = await fn();
                console.log(`ã ${name} OK ã ${all.length} partidos`);
                return all;
            } catch(e) {
                console.warn(`ã ÿ¡ ${name} fallû°:`, e.message);
            }
        }
        console.error('ã Todas las fuentes fallaron');
        return [];
    }

    // Enriquece el partido con datos en tiempo real desde elnine /match/:id
    async function enrichLiveMatch(match) {
        // Intentar primero directo a elnine, fallback al bridge
        const urls = [
            `https://api.elnine.com.ar/match/${match.id}?_t=${Date.now()}`,
            `${LOCAL_BRIDGE}/detail/${match.id}?_t=${Date.now()}`,
            `${BRIDGE_URL}/detail/${match.id}?_t=${Date.now()}`,
        ];
        for(const url of urls) {
            try {
                const r = await fetch(url, {cache:'no-store'});
                if(!r.ok) continue;
                const raw = await r.json();
                const d = raw.matchDetail ?? raw;

                match.homeScore    = d.homeTeam?.score   ?? match.homeScore;
                match.awayScore    = d.awayTeam?.score   ?? match.awayScore;
                match.minute       = d.minute             ?? match.minute;
                match.addedMinute  = d.addedMinute        ?? null;
                if(d.period) match.period = d.period;
                if(d.status) match.status = d.status;
                match.homeTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='home').length;
                match.awayTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='away').length;
                match._events = d.events || [];
                break; // ûˋxito, salir del loop
            } catch(e) { /* intentar siguiente URL */ }
        }
        return match;
    }

    async function fetchYellowCards(matchId) { /* reemplazado por enrichLiveMatch */ }

    async function poll() {
        try {
            const all = await fetchAllSmart();

            // Filtrar solo partidos del Mundial
            // Acepta cualquier slug que contenga 'world-cup' para cubrir
            // variantes como 'fifa-world-cup', 'fifa-world-cup-2026', etc.
            const WC_SLUGS = ['fifa-world-cup','fifa-world-cup-2026','world-cup-2026','world-cup'];
            const isWC = m => {
                const s = (m.tournamentCalendarSlug||'').toLowerCase();
                return WC_SLUGS.some(k=>s===k) || s.includes('world-cup');
            };
            const wc = all.filter(isWC);
            console.log(`Þ ${new Date().toISOString()} | Mundial: ${wc.length} partidos | slugs disponibles: ${[...new Set(all.map(m=>m.tournamentCalendarSlug))].join(', ')}`);
            wc.forEach(m=>console.log(`  [${m.status}] ${m.homeTeam.name} vs ${m.awayTeam.name} | ${m.startTime} | ${m.homeScore??'-'}:${m.awayScore??'-'} min:${m.minute??'-'}`));


            let match = CONFIG.autoMatch ? pickBest(wc) : wc.find(m=>m.id===CONFIG.matchId)||null;

            if(!match){ console.warn('ã ÿ¡ No hay partido del Mundial'); return; }

            // Si cambiû° el partido, resetear estado
            if(match.id !== CONFIG.matchId) {
                console.info(`Þ Nuevo partido: ${match.homeTeam.name} vs ${match.awayTeam.name} (${match.id})`);
                CONFIG.matchId = match.id;
                fired.goalKeys.clear();
                fired.yH=0; fired.yA=0; fired.rH=0; fired.rA=0;
                fired.ht=false; fired.ft=false;
                prevYH=0; prevYA=0;
                state.ready=false;
            }

            // Enriquecer siempre en partidos live con datos de /detail (score, minuto, eventos)
            if(match.status==='live') {
                match = await enrichLiveMatch(match);
            }

            renderMatch(match);
            if(!state.ready) state.ready = true;
            checkEvents(match);

            // Amarillas en paralelo (no bloqueante)
            if(match.status==='live') fetchYellowCards(match.id);

        } catch(err) {
            console.error('ã poll error:', err);
        }
    }

    // ãã INIT ããããããããããããããããããããããããããããããããããããããããããããããããããããã
    console.log(`Þ Overlay iniciado | bridges: local=${LOCAL_BRIDGE} render=${BRIDGE_URL}`);
    poll();
    setInterval(poll, CONFIG.pollIntervalMs);
    </script>
