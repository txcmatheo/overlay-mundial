<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Scoreboard Overlay - Mundial 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;1,700&display=swap');
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 12px;
            background-color: transparent;
            font-family: 'Barlow Condensed', sans-serif;
            overflow: hidden;
        }
        .overlay-row {
            --home-a: #00ffc8; --home-b: #ffffff;
            --away-a: #8a6bff; --away-b: #ffffff;
            display: flex; align-items: center; width: fit-content;
        }
        .scoreboard {
            display: flex; align-items: center;
            background: #0a0a0a; border-radius: 50px;
            padding: var(--sb-pad-v, 8px) var(--sb-pad-h, 28px); width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative; isolation: isolate; z-index: 2;
            border: 1px solid rgba(255,255,255,0.08);
        }
        /* grids de colores asociados a cada bandera, confinados a cada lado */
        .scoreboard::before, .scoreboard::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 58%;
            z-index: 0; pointer-events: none; opacity: 0.16; mix-blend-mode: screen;
            background-image:
                repeating-linear-gradient(90deg, currentColor 0 1px, transparent 1px 14px),
                repeating-linear-gradient(0deg,  currentColor 0 1px, transparent 1px 14px);
        }
        .scoreboard::before {
            left: 0; color: var(--home-a); border-radius: 50px 0 0 50px;
            -webkit-mask-image: linear-gradient(90deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
            -webkit-mask-composite: destination-in;
                    mask-image: linear-gradient(90deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
                    mask-composite: intersect;
        }
        .scoreboard::after {
            right: 0; color: var(--away-a); border-radius: 0 50px 50px 0;
            -webkit-mask-image: linear-gradient(270deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
            -webkit-mask-composite: destination-in;
                    mask-image: linear-gradient(270deg, #000 55%, transparent 100%),
                                linear-gradient(180deg, #000 0%, #000 40%, transparent 100%);
                    mask-composite: intersect;
        }
        /* Anillo grueso uniforme en todo el perímetro */
        .accent-line {
            position: absolute; inset: -6px;
            border-radius: 58px; z-index: -1; pointer-events: none;
            padding: 6px;
            background: linear-gradient(90deg, var(--home-a), var(--home-b) 45%, var(--away-b) 55%, var(--away-a));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
                    mask-image: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                    mask-composite: exclude;
            filter: drop-shadow(0 0 4px var(--home-a)) drop-shadow(0 0 4px var(--away-a));
            opacity: 0.9;
            clip-path: inset(8px 0 0 0 round 58px);
        }
        .timer-box {
            background: #fff; color: #000;
            padding: var(--timer-pad-v, 8px) var(--timer-pad-r, 32px) var(--timer-pad-v, 8px) var(--timer-pad-l, 20px);
            font-size: var(--timer-font, 22px); font-weight: 800;
            border-radius: 50px; min-width: var(--timer-min-w, 60px); text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            position: relative; z-index: 1; margin-right: var(--timer-overlap, -26px);
        }
        .teams-container { display: flex; align-items: center; }
        .team { position: relative; z-index: 2; display: flex; align-items: center; color: #fff; font-size: var(--team-font, 26px); letter-spacing: 2px; gap: var(--team-gap, 8px); }
        .flag { width: var(--flag-w, 34px); height: var(--flag-h, 22px); object-fit: cover; border-radius: 3px; box-shadow: 0 0 0 1px rgba(255,255,255,0.25); }
        .dot { width: var(--dot-size, 10px); height: var(--dot-size, 10px); border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot-home { background: var(--home-a); }
        .dot-away { background: var(--away-a); }
        .team-name { padding: 0 3px; font-weight: 700; white-space: nowrap; }
        .score-box {
            position: relative; z-index: 3;
            background: #00ffc8; color: #000;
            font-size: var(--score-font, 34px); font-weight: 900;
            padding: var(--score-pad-v, 10px) var(--score-pad-h, 14px); border-radius: 10px;
            margin: var(--score-margin-v, -13px) 0 var(--score-margin-v, -13px) 0;
            min-width: var(--score-min-w, 44px); text-align: center;
            align-self: stretch;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        #score-home { margin-right: var(--score-overlap, -8px); }
        #score-away { margin-left:  var(--score-overlap, -8px); }
        .logo-center {
            position: relative; z-index: 6;
            display: flex; align-items: center; justify-content: center;
            background: #111; border-radius: 12px;
            padding: var(--logo-pad-v, 8px) var(--logo-pad-h, 10px);
            margin: var(--logo-margin, -26px) 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .logo-center img { height: var(--logo-h, 58px); filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7)); }
        .pulse { animation: pulse-anim 0.4s ease-in-out; }
        @keyframes pulse-anim {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25); background-color: #ff0055; color: white; }
            100% { transform: scale(1); }
        }
        #event-panel {
            margin-top: 10px; width: fit-content; opacity: 0;
            transform: translateY(-12px) scale(0.95);
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
        }
        #event-panel.visible { opacity: 1; transform: translateY(0) scale(1); }
        .event-card {
            display: flex; align-items: center; gap: 12px;
            border-radius: 10px; padding: 8px 20px 8px 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6); min-width: 260px;
        }
        .event-card.goal     { background: linear-gradient(135deg,#00ffcc,#00d4aa); color:#000; }
        .event-card.yellow   { background: linear-gradient(135deg,#ffe600,#ffc200); color:#000; }
        .event-card.red      { background: linear-gradient(135deg,#ff1a1a,#cc0000); color:#fff; }
        .event-card.halftime { background: linear-gradient(135deg,#1a1a2e,#16213e); color:#fff; border:2px solid #00ffcc; }
        .event-card.fulltime { background: linear-gradient(135deg,#0f3460,#533483); color:#fff; border:2px solid #ffe600; }
        .event-icon  { font-size: 36px; line-height: 1; flex-shrink: 0; }
        .event-body  { display: flex; flex-direction: column; }
        .event-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; line-height: 1.1; }
        .event-sub   { font-size: 16px; font-weight: 400; opacity: 0.85; line-height: 1.2; }
        .scoreboard.flash-goal { animation: sb-goal  1s ease forwards; }
        .scoreboard.flash-card { animation: sb-card 0.6s ease forwards; }
        .scoreboard.flash-ht   { animation: sb-ht   0.8s ease forwards; }
        .scoreboard.flash-ft   { animation: sb-ft   1.2s ease forwards; }
        @keyframes sb-goal { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 30%{box-shadow:0 0 40px 10px rgba(0,255,204,.9)} 60%{box-shadow:0 0 60px 18px rgba(0,255,204,.5)} }
        @keyframes sb-card { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 40%{box-shadow:0 0 35px 8px rgba(255,80,0,.8)} }
        @keyframes sb-ht   { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 50%{box-shadow:0 0 40px 10px rgba(0,200,255,.7)} }
        @keyframes sb-ft   { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 25%,75%{box-shadow:0 0 50px 14px rgba(255,230,0,.85)} 50%{box-shadow:0 0 70px 22px rgba(255,230,0,.5)} }

        /* ── TRANSICIÓN DE ALTERNANCIA ── */
        .overlay-row { transition: opacity 0.4s ease; }
        .overlay-row.fading { opacity: 0; }

        /* ── BADGE SEGUNDO PARTIDO ── */
        #match2-badge {
            display: none; align-items: center; gap: 10px;
            background: #111; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px; padding: 7px 18px 7px 12px;
            margin-top: 10px; width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            font-size: 20px; color: #fff; letter-spacing: 2px;
            font-weight: 700; white-space: nowrap;
        }
        #match2-badge.visible { display: flex; }
        #match2-badge .badge-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ff3b3b; box-shadow: 0 0 8px #ff3b3b;
            animation: blink-red 1s ease-in-out infinite; flex-shrink: 0;
        }
        @keyframes blink-red { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #match2-badge .badge-score { color: #00ffc8; }
        #match2-badge .badge-label { font-size: 12px; font-weight: 400; opacity: 0.5; margin-left: 4px; letter-spacing: 0; }
    </style>
</head>

    <script>
    // ══════════════════════════════════════════════════════════════
    //  CONFIGURACIÓN

    //  Local:   python bridge.py  → http://localhost:8001
    //  Render:  reemplazá BRIDGE_URL con tu URL de Render
    //  OBS:     agregar como "Browser Source"
    // ══════════════════════════════════════════════════════════════
    // ▼▼▼ Cambiá esta URL por la de tu bridge en Render ▼▼▼
    const BRIDGE_URL = 'https://overlay-mundial.onrender.com';
    // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

    // En producción (GitHub Pages) el intento al bridge local falla casi
    // instantáneamente (connection refused) y se pasa al siguiente.

    const CONFIG = {

        matchId:          '',       // se llena automático; o pon un ID manual

    const flagInfo = name => COUNTRY_MAP[name] || [null, name.substring(0,3).toUpperCase()];
    const setFlag  = (el, iso) => { if(iso){el.src=`https://flagcdn.com/w80/${iso}.png`;el.style.visibility='visible';}else{el.style.visibility='hidden';} };

    // ── COLORES DE BANDERA (para el grid del scoreboard) ─────────

    const FLAG_COLORS = {

    const flagAccents = iso => FLAG_COLORS[iso] || ['#00ffc8','#ffffff'];
    const row = document.querySelector('.overlay-row');
    function applyTeamColors(hIso, aIso) {
        const [ha,hb] = flagAccents(hIso);
        const [aa,ab] = flagAccents(aIso);
        row.style.setProperty('--home-a', ha);
        row.style.setProperty('--home-b', hb);

    // ── AUDIO ────────────────────────────────────────────────────
    let _actx = null;
    const actx = () => _actx || (_actx = new (window.AudioContext||window.webkitAudioContext)());
    function tone(freq, type, dur, vol, delay=0) {
        const c=actx(), o=c.createOscillator(), g=c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type=type; o.frequency.setValueAtTime(freq, c.currentTime+delay);
        g.gain.setValueAtTime(vol, c.currentTime+delay);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+delay+dur);
        o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur+0.05);
    }

        _priorityId: null,    // id con prioridad por gol reciente
        _priorityUntil: 0,
        PRIORITY_MS: 30000,   // 30s de prioridad tras gol
        ROTATE_MS:   20000,   // alternancia normal cada 20s

    // Urgencia = minutos jugados + goles×15
    function matchUrgency(m) {
        return (m.minute ?? 0) + ((m.homeScore ?? 0) + (m.awayScore ?? 0)) * 15;
    }

    // Índice del partido que debería estar en pantalla
    function highPriorityIndex() {
        if(rotation.matches.length < 2) return 0;
        if(rotation._priorityId && Date.now() < rotation._priorityUntil) {
            const idx = rotation.matches.findIndex(m => m.id === rotation._priorityId);
            if(idx >= 0) return idx;
        }
        const [a, b] = rotation.matches;
        const ua = matchUrgency(a), ub = matchUrgency(b);
        if(Math.abs(ua - ub) > 10) return ua > ub ? 0 : 1;
        return rotation.index; // similares → no forzar
    }

    // Detectar goles nuevos y activar prioridad
    function checkGoalPriority() {
        rotation.matches.forEach(m => {
            const prev  = rotation._lastGoal[m.id] ?? -1;
            const total = (m.homeScore ?? 0) + (m.awayScore ?? 0);
            if(prev >= 0 && total > prev) {
                rotation._priorityId    = m.id;
                rotation._priorityUntil = Date.now() + rotation.PRIORITY_MS;
                console.info(`⚽ Gol → prioridad a ${m.homeTeam.name} vs ${m.awayTeam.name} por ${rotation.PRIORITY_MS/1000}s`);
            }
            rotation._lastGoal[m.id] = total;
        });
    }

    function rotateTo(idx, animate = true) {
        if(rotation.matches.length < 2) return;
        idx = ((idx % rotation.matches.length) + rotation.matches.length) % rotation.matches.length;
        if(idx === rotation.index && animate) return;
        rotation.index = idx;
        if(!animate) { renderMatch(rotation.matches[idx]); updateBadge(); return; }
        row.classList.add('fading');
        setTimeout(() => { renderMatch(rotation.matches[idx]); updateBadge(); row.classList.remove('fading'); }, 420);
    }

    function startRotation() {
        if(rotation._timer) clearInterval(rotation._timer);
        rotation._timer = setInterval(() => {
            if(rotation.matches.length < 2) return;
            const best = highPriorityIndex();
            best !== rotation.index ? rotateTo(best) : rotateTo(rotation.index + 1);
        }, rotation.ROTATE_MS);
    }

    function stopRotation() {
        if(rotation._timer) { clearInterval(rotation._timer); rotation._timer = null; }
    }

    // ── EVENTOS ──────────────────────────────────────────────────
    // Usa m._events[] poblado por enrichLiveMatch desde /detail/:id
    // Estructura real: {minute, type:"goal"|"goal-own"|"yellow"|"red",
    //                   team:"home"|"away", playerName, playerNameFull, assist, assistFull}

    function checkEvents(m) {
        const fired = getFired(m.id);
        if(!rotation._readyMap[m.id]) return;
        const [,hCode] = flagInfo(m.homeTeam.name);
        const [,aCode] = flagInfo(m.awayTeam.name);
        const hn = CONFIG.useFullNames ? m.homeTeam.name : hCode;
        const an = CONFIG.useFullNames ? m.awayTeam.name : aCode;

        // Minuto actual del partido
        const currentMinute = m.minute ?? null;

        (m._events||[]).forEach(ev => {
            const key = `${ev.type}-${ev.team}-${ev.minute}-${ev.addedMinute||0}-${ev.playerName||''}`;
            if(fired.goalKeys.has(key)) return;
            fired.goalKeys.add(key);

            // Validar que el evento ocurrió cerca del minuto actual.
            // Si el evento es más de 2 minutos anterior al minuto actual del partido,
            // significa que ya había pasado antes de esta sesión → ignorar.
            // Margen de +2 para cubrir el lag de la API (el evento puede llegar
            // 1-2 polls después de que realmente ocurrió).
            if(currentMinute != null && ev.minute != null) {
                const evEffectiveMinute = (ev.minute ?? 0) + (ev.addedMinute ?? 0);
                const diff = currentMinute - evEffectiveMinute;
                if(diff > 2) {
                    console.log(`⏩ Evento ignorado (min ${ev.minute} vs actual ${currentMinute}): ${key}`);
                    return;
                }
            }

            const teamName  = ev.team==='home' ? hn : an;
            const opponent  = ev.team==='home' ? an : hn;
            const player    = ev.playerNameFull || ev.playerName || '';
            const minLabel  = ev.minute != null
                ? (ev.addedMinute ? `${ev.minute}+${ev.addedMinute}'` : `${ev.minute}'`)
                : '';
            const minStr    = minLabel ? ` — ${minLabel}` : '';
            const assistStr = ev.assist ? ` (Ast: ${ev.assistFull||ev.assist})` : '';

            if(ev.type==='goal') {
                showEvent({type:'goal', icon:'⚽',
                    title:`¡GOL! ${teamName}`,
                    sub:`${player}${minStr}${assistStr}`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='goal-own') {
                showEvent({type:'goal', icon:'⚽',
                    title:`¡GOL EN CONTRA! ${opponent}`,
                    sub:`${player}${minStr} (en propia)`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='yellow') {
                showEvent({type:'yellow', icon:'🟨',
                    title:'TARJETA AMARILLA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.yellowCard, flash:'flash-card'});
            } else if(ev.type==='red') {
                showEvent({type:'red', icon:'🟥',
                    title:'TARJETA ROJA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.redCard, flash:'flash-card'});
            }
        });

        // Medio tiempo
        if(!fired.ht && m.period==='HT') {
            fired.ht=true;
            showEvent({type:'halftime', icon:'⏸️', title:'MEDIO TIEMPO',
                sub:`${hn} ${m.homeScore??0} — ${m.awayScore??0} ${an}`,
                sfx:SFX.halfTime, flash:'flash-ht'});
        }

        // Final
        if(!fired.ft && m.status==='finished') {
            fired.ft=true;
            showEvent({type:'fulltime', icon:'🏁', title:'FIN DEL PARTIDO',
                sub:`${hn} ${m.homeScore??0} — ${m.awayScore??0} ${an}`,
                sfx:SFX.fullTime, flash:'flash-ft'});
        }
    }

    // ── FETCH SCHEDULE → extraer partido del Mundial ─────────────
    //
    //  FLUJO:
    //  1. GET /match del bridge → partidos ayer+hoy+mañana en 1 request
    //  2. Filtrar tournamentCalendarSlug contiene 'world-cup'
    //  3. Elegir el mejor (live > próximo > último terminado)
    //  4. Si está live → GET /detail/:id → score, minuto, eventos (goles, tarjetas)
    //
    // Devuelve ARRAY de hasta 2 partidos (para alternancia).
    // - Live: hasta 2 simultáneos
    // - Upcoming: si el próximo bloque horario tiene 2+ partidos, devuelve los 2
    //   (mismo criterio para pending)
    function pickBest(matches) {
        const now = Date.now();
        const SLOT_WINDOW_MS = 10 * 60 * 1000; // 10 min de margen para considerar "mismo bloque"

        // 1. Live
        const live = matches.filter(m=>m.status==='live');
        if(live.length){ live.sort((a,b)=>(b.minute??0)-(a.minute??0)); return live.slice(0,2); }

        // 2. Pending (empezaron hace menos de 2h pero no están live aún)
        const pending = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t<=now&&(now-t)<=2*60*60*1000);
        if(pending.length){
            pending.sort((a,b)=>b.t-a.t);
            const ref = pending[0].t;
            const slot = pending.filter(({t})=>Math.abs(t-ref)<=SLOT_WINDOW_MS);
            return slot.slice(0,2).map(({m})=>m);
        }

        // 3. Upcoming — tomar el bloque horario más cercano completo
        const upcoming = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t>now);
        if(upcoming.length){
            upcoming.sort((a,b)=>a.t-b.t);
            const ref = upcoming[0].t;
            // Todos los que arrancan dentro de los 10 min siguientes al primero
            const slot = upcoming.filter(({t})=>t-ref<=SLOT_WINDOW_MS);
            return slot.slice(0,2).map(({m})=>m);
        }

        // 4. Último terminado
        const finished = matches
            .filter(m=>m.status==='finished')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t));
        if(finished.length){ finished.sort((a,b)=>b.t-a.t); return [finished[0].m]; }
        return [];
    }

    // Fechas en hora Argentina (UTC-3) — mismo criterio que elnine para indexar partidos
    function arDates() {
        const AR_OFFSET = -3 * 60; // minutos
        const now = new Date();
        const toAR = d => { const x = new Date(d); x.setMinutes(x.getMinutes() + AR_OFFSET - x.getTimezoneOffset()); return x; };
        const fmt  = d => toAR(d).toISOString().slice(0,10);
        const y = new Date(now); y.setDate(now.getDate()-1);
        const t = new Date(now); t.setDate(now.getDate()+1);
        return [fmt(y), fmt(now), fmt(t)];
    }

    // Llama directamente a elnine (funciona desde el browser, CORS está abierto)
    async function fetchScheduleDate(dateStr) {
        const url = `https://api.elnine.com.ar/schedule?date=${dateStr}&_t=${Date.now()}`;
        const r = await fetch(url, {cache:'no-store'});
        if(!r.ok) throw new Error(`elnine HTTP ${r.status}`);
        return (await r.json()).matches || [];
    }

    // Fetch directo a elnine para las 3 fechas en paralelo (estrategia principal)
    async function fetchAllDirect() {
        const dates = arDates();
        const results = await Promise.allSettled(dates.map(d => fetchScheduleDate(d)));
        const seen = new Set(), all = [];
        let okCount = 0;
        results.forEach((r, i) => {
            if(r.status==='fulfilled') {
                okCount++;
                for(const m of r.value) {
                    if(!seen.has(m.id)){ seen.add(m.id); all.push(m); }
                }
            } else {
                console.warn(`⚠️ fetchScheduleDate(${dates[i]}) falló:`, r.reason);
            }
        });
        // Si NINGUNA fecha pudo consultarse (CORS, red, etc.), no confiar en
        // "all=[]" como si fuera un resultado real — forzar fallback al bridge.
        if(okCount === 0) {
            throw new Error('fetchAllDirect: las 3 fechas fallaron (ver warnings arriba)');
        }
        return all;
    }

    // Bridge como fallback (proxy CORS), parametrizado por URL base
    async function fetchAllViaBridge(base) {
        const r = await fetch(`${base}/match?_t=${Date.now()}`, {cache:'no-store'});
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const all = [];
        for(const item of (data.items||[])) {
            for(const m of (item.matches||[])) all.push(m);
        }
        return all;
    }

    // Intenta, en orden: bridge local → elnine directo → bridge de Render.
    // El primero que responda sin lanzar error (incluso con 0 partidos
    // legítimos) gana. Errores (CORS, connection refused, etc.) pasan al siguiente.
    async function fetchAllSmart() {
        const strategies = [
            ['bridge-local',  () => fetchAllViaBridge(LOCAL_BRIDGE)],
            ['elnine-directo', fetchAllDirect],
            ['bridge-render', () => fetchAllViaBridge(BRIDGE_URL)],
        ];
        for(const [name, fn] of strategies) {
            try {
                const all = await fn();
                console.log(`✅ ${name} OK → ${all.length} partidos`);
                return all;
            } catch(e) {
                console.warn(`⚠️ ${name} falló:`, e.message);
            }
        }
        console.error('❌ Todas las fuentes fallaron');
        return [];
    }

    // Enriquece el partido con datos en tiempo real desde elnine /match/:id
    async function enrichLiveMatch(match) {
        // Intentar primero directo a elnine, fallback al bridge
        const urls = [
            `https://api.elnine.com.ar/match/${match.id}?_t=${Date.now()}`,
            `${LOCAL_BRIDGE}/detail/${match.id}?_t=${Date.now()}`,
            `${BRIDGE_URL}/detail/${match.id}?_t=${Date.now()}`,
        ];
        for(const url of urls) {
            try {
                const r = await fetch(url, {cache:'no-store'});
                if(!r.ok) continue;
                const raw = await r.json();
                const d = raw.matchDetail ?? raw;

                match.homeScore    = d.homeTeam?.score   ?? match.homeScore;
                match.awayScore    = d.awayTeam?.score   ?? match.awayScore;
                match.minute       = d.minute             ?? match.minute;
                match.addedMinute  = d.addedMinute        ?? null;
                if(d.period) match.period = d.period;
                if(d.status) match.status = d.status;
                match.homeTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='home').length;
                match.awayTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='away').length;
                match._events = d.events || [];
                break; // éxito, salir del loop
            } catch(e) { /* intentar siguiente URL */ }
        }
        return match;
    }

    async function fetchYellowCards(matchId) { /* reemplazado por enrichLiveMatch */ }

    async function poll() {
        try {
            const all = await fetchAllSmart();

            const WC_SLUGS = ['fifa-world-cup','fifa-world-cup-2026','world-cup-2026','world-cup'];
            const isWC = m => {
                const s = (m.tournamentCalendarSlug||'').toLowerCase();
                return WC_SLUGS.some(k=>s===k) || s.includes('world-cup');
            };
            const wc = all.filter(isWC);
            console.log(`📅 ${new Date().toISOString()} | Mundial: ${wc.length} partidos | slugs: ${[...new Set(all.map(m=>m.tournamentCalendarSlug))].join(', ')}`);
            wc.forEach(m=>console.log(`  [${m.status}] ${m.homeTeam.name} vs ${m.awayTeam.name} | ${m.homeScore??'-'}:${m.awayScore??'-'} min:${m.minute??'-'}`));

            // pickBest ahora devuelve array de hasta 2 partidos
            let picked = CONFIG.autoMatch
                ? pickBest(wc)
                : (wc.find(m=>m.id===CONFIG.matchId) ? [wc.find(m=>m.id===CONFIG.matchId)] : []);

            if(!picked.length){ console.warn('⚠️ No hay partido del Mundial'); return; }

            // Enriquecer partidos live en paralelo
            picked = await Promise.all(picked.map(m => m.status==='live' ? enrichLiveMatch(m) : m));

            // Detectar cambios en la lista de partidos
            const newIds  = picked.map(m=>m.id).sort().join(',');
            const prevIds = rotation.matches.map(m=>m.id).sort().join(',');

            if(newIds !== prevIds) {
                console.info(`🔄 Partidos: ${picked.map(m=>`${m.homeTeam.name} vs ${m.awayTeam.name}`).join(' | ')}`);
                picked.forEach(m => { if(!rotation._readyMap[m.id]) rotation._readyMap[m.id] = false; });

                // Conservar en pantalla el partido que sigue activo
                const currentId = rotation.matches[rotation.index]?.id;
                const newIndex  = picked.findIndex(m => m.id === currentId);
                rotation.matches = picked;
                rotation.index   = newIndex >= 0 ? newIndex : 0;

                picked.length >= 2 ? startRotation() : stopRotation();
            } else {
                // Actualizar datos frescos
                picked.forEach((fresh, i) => { rotation.matches[i] = fresh; });
            }

            // Detectar goles y ajustar prioridad
            checkGoalPriority();

            // Si hay un partido más urgente, mostrarlo ya
            const best = highPriorityIndex();
            if(rotation.matches.length >= 2 && best !== rotation.index) rotateTo(best);

            // Render + eventos de todos los partidos
            rotation.matches.forEach((m, i) => {
                if(!rotation._readyMap[m.id]) rotation._readyMap[m.id] = true;
                if(i === rotation.index) { renderMatch(m); updateBadge(); }
                checkEvents(m);
                if(m.status==='live') fetchYellowCards(m.id);
            });

            if(!state.ready) state.ready = true;

        } catch(err) {
            console.error('❌ poll error:', err);
        }
    }

    // ── INIT ─────────────────────────────────────────────────────
    console.log(`🚀 Overlay iniciado | bridges: local=${LOCAL_BRIDGE} render=${BRIDGE_URL}`);
    poll();
    setInterval(poll, CONFIG.pollIntervalMs);
    </script>
</body>
