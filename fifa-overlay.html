<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Scoreboard Overlay - Mundial 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;1,700&display=swap');
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            background-color: transparent;
            font-family: 'Barlow Condensed', sans-serif;
            overflow: hidden;
        }
        .scoreboard {
            display: flex; align-items: center;
            background: #000; border-radius: 12px;
            padding: 4px 8px; width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 2px solid #222; position: relative;
        }
        .timer-box {
            background: #fff; color: #000;
            padding: 6px 16px; font-size: 28px; font-weight: bold;
            border-radius: 8px; min-width: 70px; text-align: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
        }
        .teams-container { display: flex; align-items: center; padding: 0 10px; }
        .team { display: flex; align-items: center; color: #fff; font-size: 26px; letter-spacing: 1px; }
        .flag { width: 32px; height: 22px; object-fit: cover; border-radius: 3px; box-shadow: 0 0 0 1px rgba(255,255,255,0.25); }
        .team-name { padding: 0 10px; font-weight: 700; }
        .score-box {
            background: #00ffcc; color: #000;
            font-size: 28px; font-weight: bold;
            padding: 4px 14px; border-radius: 6px;
            margin: 0 8px; min-width: 20px; text-align: center;
        }
        .logo-center { height: 35px; margin: 0 5px; display: flex; align-items: center; }
        .logo-center img { height: 100%; filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.8)); }
        .pulse { animation: pulse-anim 0.4s ease-in-out; }
        @keyframes pulse-anim {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25); background-color: #ff0055; color: white; }
            100% { transform: scale(1); }
        }
        #event-panel {
            margin-top: 10px; width: fit-content; opacity: 0;
            transform: translateY(-12px) scale(0.95);
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
        }
        #event-panel.visible { opacity: 1; transform: translateY(0) scale(1); }
        .event-card {
            display: flex; align-items: center; gap: 12px;
            border-radius: 10px; padding: 8px 20px 8px 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6); min-width: 260px;
        }
        .event-card.goal     { background: linear-gradient(135deg,#00ffcc,#00d4aa); color:#000; }
        .event-card.yellow   { background: linear-gradient(135deg,#ffe600,#ffc200); color:#000; }
        .event-card.red      { background: linear-gradient(135deg,#ff1a1a,#cc0000); color:#fff; }
        .event-card.halftime { background: linear-gradient(135deg,#1a1a2e,#16213e); color:#fff; border:2px solid #00ffcc; }
        .event-card.fulltime { background: linear-gradient(135deg,#0f3460,#533483); color:#fff; border:2px solid #ffe600; }
        .event-icon  { font-size: 36px; line-height: 1; flex-shrink: 0; }
        .event-body  { display: flex; flex-direction: column; }
        .event-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; line-height: 1.1; }
        .event-sub   { font-size: 16px; font-weight: 400; opacity: 0.85; line-height: 1.2; }
        .scoreboard.flash-goal { animation: sb-goal  1s ease forwards; }
        .scoreboard.flash-card { animation: sb-card 0.6s ease forwards; }
        .scoreboard.flash-ht   { animation: sb-ht   0.8s ease forwards; }
        .scoreboard.flash-ft   { animation: sb-ft   1.2s ease forwards; }
        @keyframes sb-goal { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 30%{box-shadow:0 0 40px 10px rgba(0,255,204,.9)} 60%{box-shadow:0 0 60px 18px rgba(0,255,204,.5)} }
        @keyframes sb-card { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 40%{box-shadow:0 0 35px 8px rgba(255,80,0,.8)} }
        @keyframes sb-ht   { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 50%{box-shadow:0 0 40px 10px rgba(0,200,255,.7)} }
        @keyframes sb-ft   { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5)} 25%,75%{box-shadow:0 0 50px 14px rgba(255,230,0,.85)} 50%{box-shadow:0 0 70px 22px rgba(255,230,0,.5)} }
    </style>
</head>
<body>
    <div class="scoreboard" id="scoreboard">
        <div class="timer-box" id="clock">--:--</div>
        <div class="teams-container">
            <div class="team">
                <img class="flag" id="flag-home" src="" alt="">
                <span class="team-name" id="name-home">---</span>
                <div class="score-box" id="score-home">0</div>
            </div>
            <div class="logo-center">
                <img src="https://cdn.elnine.com.ar/leagues/world-cup-white.webp" alt="FIFA 26">
            </div>
            <div class="team">
                <div class="score-box" id="score-away">0</div>
                <span class="team-name" id="name-away">---</span>
                <img class="flag" id="flag-away" src="" alt="">
            </div>
        </div>
    </div>
    <div id="event-panel">
        <div class="event-card" id="event-card">
            <div class="event-icon" id="event-icon">⚽</div>
            <div class="event-body">
                <div class="event-title" id="event-title">GOL</div>
                <div class="event-sub"   id="event-sub">Jugador</div>
            </div>
        </div>
    </div>

    <script>
    // ══════════════════════════════════════════════════════════════
    //  CONFIGURACIÓN
    //  Todas las llamadas van al BRIDGE (proxy CORS).
    //  Local:   python bridge.py  → http://localhost:8001
    //  Render:  reemplazá BRIDGE_URL con tu URL de Render
    //  OBS:     agregar como "Browser Source"
    // ══════════════════════════════════════════════════════════════
    // ▼▼▼ Cambiá esta URL por la de tu bridge en Render ▼▼▼
    const BRIDGE_URL = 'https://overlay-mundial.onrender.com';
    // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

    // Autodetección: si estás en localhost usa el bridge local (python bridge.py → puerto 8001)
    const IS_LOCAL = location.protocol !== 'https:';
    const API = IS_LOCAL ? 'http://localhost:8001' : BRIDGE_URL;

    const CONFIG = {
        autoMatch:        true,
        matchId:          '',       // se llena automático; o pon un ID manual
        pollIntervalMs:   5000,
        eventDurationMs:  6000,
        useFullNames:     false,
    };

    // ── COUNTRY MAP ──────────────────────────────────────────────
    const COUNTRY_MAP = {
        'Canadá':['ca','CAN'],'Canada':['ca','CAN'],
        'Bosnia-Herzegovina':['ba','BIH'],
        'Estados Unidos':['us','USA'],'United States':['us','USA'],
        'Paraguay':['py','PAR'],'México':['mx','MEX'],'Mexico':['mx','MEX'],
        'Argentina':['ar','ARG'],'Brasil':['br','BRA'],'Brazil':['br','BRA'],
        'Uruguay':['uy','URU'],'Colombia':['co','COL'],'Ecuador':['ec','ECU'],
        'Chile':['cl','CHI'],'Perú':['pe','PER'],'Peru':['pe','PER'],
        'Bolivia':['bo','BOL'],'Venezuela':['ve','VEN'],
        'Francia':['fr','FRA'],'France':['fr','FRA'],
        'Alemania':['de','GER'],'Germany':['de','GER'],
        'España':['es','ESP'],'Spain':['es','ESP'],
        'Inglaterra':['gb-eng','ENG'],'England':['gb-eng','ENG'],
        'Portugal':['pt','POR'],'Países Bajos':['nl','NED'],'Netherlands':['nl','NED'],
        'Bélgica':['be','BEL'],'Belgium':['be','BEL'],
        'Italia':['it','ITA'],'Italy':['it','ITA'],
        'Croacia':['hr','CRO'],'Croatia':['hr','CRO'],
        'Marruecos':['ma','MAR'],'Morocco':['ma','MAR'],
        'Japón':['jp','JPN'],'Japan':['jp','JPN'],
        'Corea del Sur':['kr','KOR'],'South Korea':['kr','KOR'],
        'Senegal':['sn','SEN'],'Ghana':['gh','GHA'],'Nigeria':['ng','NGA'],
        'Camerún':['cm','CMR'],'Cameroon':['cm','CMR'],
        'Túnez':['tn','TUN'],'Tunisia':['tn','TUN'],
        'Egipto':['eg','EGY'],'Egypt':['eg','EGY'],
        'Argelia':['dz','ALG'],'Algeria':['dz','ALG'],
        'Costa de Marfil':['ci','CIV'],'Ivory Coast':['ci','CIV'],
        'Sudáfrica':['za','RSA'],'South Africa':['za','RSA'],
        'Arabia Saudita':['sa','KSA'],'Saudi Arabia':['sa','KSA'],
        'Irán':['ir','IRN'],'Iran':['ir','IRN'],
        'Catar':['qa','QAT'],'Qatar':['qa','QAT'],
        'Australia':['au','AUS'],'Nueva Zelanda':['nz','NZL'],'New Zealand':['nz','NZL'],
        'Polonia':['pl','POL'],'Poland':['pl','POL'],
        'Suiza':['ch','SUI'],'Switzerland':['ch','SUI'],
        'Dinamarca':['dk','DEN'],'Denmark':['dk','DEN'],
        'Suecia':['se','SWE'],'Sweden':['se','SWE'],
        'Noruega':['no','NOR'],'Norway':['no','NOR'],
        'Austria':['at','AUT'],'Serbia':['rs','SRB'],
        'Ucrania':['ua','UKR'],'Ukraine':['ua','UKR'],
        'República Checa':['cz','CZE'],'Czech Republic':['cz','CZE'],
        'Gales':['gb-wls','WAL'],'Wales':['gb-wls','WAL'],
        'Escocia':['gb-sct','SCO'],'Scotland':['gb-sct','SCO'],
        'Turquía':['tr','TUR'],'Turkey':['tr','TUR'],
        'Grecia':['gr','GRE'],'Greece':['gr','GRE'],
        'Panamá':['pa','PAN'],'Panama':['pa','PAN'],
        'Costa Rica':['cr','CRC'],'Jamaica':['jm','JAM'],'Honduras':['hn','HON'],
        'Haití':['ht','HAI'],'Jordania':['jo','JOR'],'Uzbekistán':['uz','UZB'],
        'Curazao':['cw','CUW'],'Nueva Caledonia':['nc','NCL'],
    };
    const flagInfo = name => COUNTRY_MAP[name] || [null, name.substring(0,3).toUpperCase()];
    const setFlag  = (el, iso) => { if(iso){el.src=`https://flagcdn.com/w80/${iso}.png`;el.style.visibility='visible';}else{el.style.visibility='hidden';} };

    // ── AUDIO ────────────────────────────────────────────────────
    let _actx = null;
    const actx = () => _actx || (_actx = new (window.AudioContext||window.webkitAudioContext)());
    function tone(freq, type, dur, vol, delay=0) {
        const c=actx(), o=c.createOscillator(), g=c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type=type; o.frequency.setValueAtTime(freq, c.currentTime+delay);
        g.gain.setValueAtTime(vol, c.currentTime+delay);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+delay+dur);
        o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur+0.05);
    }
    const SFX = {
        goal() {
            [523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f,'square',0.18,0.18,i*0.13));
            [130,196,261].forEach((f,i)=>tone(f,'triangle',0.35,0.12,i*0.18));
            try {
                const c=actx(), n=c.sampleRate*1.5, b=c.createBuffer(1,n,c.sampleRate);
                const d=b.getChannelData(0); for(let j=0;j<n;j++) d[j]=(Math.random()*2-1)*0.06;
                const s=c.createBufferSource(); s.buffer=b;
                const f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=900; f.Q.value=0.8;
                const g=c.createGain(); g.gain.setValueAtTime(1,c.currentTime+0.8); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+2.2);
                s.connect(f); f.connect(g); g.connect(c.destination); s.start(c.currentTime+0.8);
            } catch(e){}
        },
        yellowCard() { tone(2200,'sine',0.12,0.3); tone(2400,'sine',0.10,0.25,0.14); tone(2200,'sine',0.15,0.2,0.26); },
        redCard()    { tone(2300,'sine',0.5,0.35); tone(110,'sawtooth',0.4,0.15,0.55); tone(90,'sawtooth',0.4,0.12,0.7); },
        halfTime()   { [0,0.22,0.44].forEach(d=>tone(2100,'sine',0.15,0.3,d)); },
        fullTime()   { tone(2100,'sine',0.8,0.35); [784,698,659,587,523].forEach((f,i)=>tone(f,'square',0.2,0.14,0.9+i*0.15)); },
    };

    // ── UI REFS ──────────────────────────────────────────────────
    const $  = id => document.getElementById(id);
    const sb = $('scoreboard');
    const ui = { clock:$('clock'), nameHome:$('name-home'), nameAway:$('name-away'),
                 scoreHome:$('score-home'), scoreAway:$('score-away'),
                 flagHome:$('flag-home'), flagAway:$('flag-away') };

    function pulse(el) { el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); setTimeout(()=>el.classList.remove('pulse'),500); }

    let evTimer = null;
    function showEvent({type,icon,title,sub,sfx,flash}) {
        if(evTimer) clearTimeout(evTimer);
        sb.className='scoreboard'; void sb.offsetWidth; if(flash) sb.classList.add(flash);
        try { if(sfx) sfx(); } catch(e){}
        $('event-card').className=`event-card ${type}`;
        $('event-icon').textContent=icon; $('event-title').textContent=title; $('event-sub').textContent=sub||'';
        const p=$('event-panel'); p.classList.remove('visible'); void p.offsetWidth; p.classList.add('visible');
        evTimer=setTimeout(()=>{ p.classList.remove('visible'); sb.classList.remove(flash); }, CONFIG.eventDurationMs);
    }

    // ── ESTADO ───────────────────────────────────────────────────
    const fired = { goalKeys:new Set(), yH:0,yA:0, rH:0,rA:0, ht:false, ft:false };
    let state = { homeName:'---',awayName:'---',homeId:'',awayId:'', ready:false };


    // ── EVENTOS ──────────────────────────────────────────────────
    // Usa m._events[] poblado por enrichLiveMatch desde /detail/:id
    // Estructura real: {minute, type:"goal"|"goal-own"|"yellow"|"red",
    //                   team:"home"|"away", playerName, playerNameFull, assist, assistFull}
    function checkEvents(m) {
        if(!state.ready) return;
        const {homeName:hn, awayName:an} = state;

        (m._events||[]).forEach(ev => {
            const key = `${ev.type}-${ev.team}-${ev.minute}-${ev.addedMinute||0}-${ev.playerName||''}`;
            if(fired.goalKeys.has(key)) return;
            fired.goalKeys.add(key);

            const teamName  = ev.team==='home' ? hn : an;
            const opponent  = ev.team==='home' ? an : hn;
            const player    = ev.playerNameFull || ev.playerName || '';
            const minLabel  = ev.minute != null
                ? (ev.addedMinute ? `${ev.minute}+${ev.addedMinute}'` : `${ev.minute}'`)
                : '';
            const minStr    = minLabel ? ` — ${minLabel}` : '';
            const assistStr = ev.assist ? ` (Ast: ${ev.assistFull||ev.assist})` : '';

            if(ev.type==='goal') {
                showEvent({type:'goal', icon:'⚽',
                    title:`¡GOL! ${teamName}`,
                    sub:`${player}${minStr}${assistStr}`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='goal-own') {
                showEvent({type:'goal', icon:'⚽',
                    title:`¡GOL EN CONTRA! ${opponent}`,
                    sub:`${player}${minStr} (en propia)`,
                    sfx:SFX.goal, flash:'flash-goal'});
            } else if(ev.type==='yellow') {
                showEvent({type:'yellow', icon:'🟨',
                    title:'TARJETA AMARILLA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.yellowCard, flash:'flash-card'});
            } else if(ev.type==='red') {
                showEvent({type:'red', icon:'🟥',
                    title:'TARJETA ROJA',
                    sub:`${player} (${teamName})${minStr}`,
                    sfx:SFX.redCard, flash:'flash-card'});
            }
        });

        // Medio tiempo
        if(!fired.ht && m.period==='HT') {
            fired.ht=true;
            showEvent({type:'halftime', icon:'⏸️', title:'MEDIO TIEMPO',
                sub:`${hn} ${m.homeScore??0} — ${m.awayScore??0} ${an}`,
                sfx:SFX.halfTime, flash:'flash-ht'});
        }

        // Final
        if(!fired.ft && m.status==='finished') {
            fired.ft=true;
            showEvent({type:'fulltime', icon:'🏁', title:'FIN DEL PARTIDO',
                sub:`${hn} ${m.homeScore??0} — ${m.awayScore??0} ${an}`,
                sfx:SFX.fullTime, flash:'flash-ft'});
        }
    }

    // ── SCOREBOARD UI ────────────────────────────────────────────
    function formatClock(m) {
        if(m.status==='live') {
            if(m.period==='HT') return 'MT';
            if(m.minute!=null) {
                return m.addedMinute ? `${m.minute}+${m.addedMinute}'` : `${m.minute}'`;
            }
            return 'EN VIVO';
        }
        if(m.status==='finished')  return 'FT';
        if(m.status==='postponed') return 'SUSP';
        return new Date(m.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    }

    function renderMatch(m) {
        const [hIso,hCode] = flagInfo(m.homeTeam.name);
        const [aIso,aCode] = flagInfo(m.awayTeam.name);
        const hn = CONFIG.useFullNames ? m.homeTeam.name : hCode;
        const an = CONFIG.useFullNames ? m.awayTeam.name : aCode;

        ui.nameHome.textContent = hn;
        ui.nameAway.textContent = an;
        setFlag(ui.flagHome, hIso);
        setFlag(ui.flagAway, aIso);

        const clk = formatClock(m);
        if(ui.clock.textContent!==clk) ui.clock.textContent=clk;

        const hs=String(m.homeScore??0), as=String(m.awayScore??0);
        if(ui.scoreHome.textContent!==hs){ ui.scoreHome.textContent=hs; if(state.ready) pulse(ui.scoreHome); }
        if(ui.scoreAway.textContent!==as){ ui.scoreAway.textContent=as; if(state.ready) pulse(ui.scoreAway); }

        state.homeName=hn; state.awayName=an;
        state.homeId=m.homeTeam.id; state.awayId=m.awayTeam.id;
    }

    // ── FETCH SCHEDULE → extraer partido del Mundial ─────────────
    //
    //  FLUJO:
    //  1. GET /match del bridge → partidos ayer+hoy+mañana en 1 request
    //  2. Filtrar tournamentCalendarSlug contiene 'world-cup'
    //  3. Elegir el mejor (live > próximo > último terminado)
    //  4. Si está live → GET /detail/:id → score, minuto, eventos (goles, tarjetas)
    //
    function pickBest(matches) {
        const now = Date.now();
        const live = matches.filter(m=>m.status==='live');
        if(live.length){ live.sort((a,b)=>(b.minute??0)-(a.minute??0)); return live[0]; }
        const pending = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t<=now&&(now-t)<=2*60*60*1000);
        if(pending.length){ pending.sort((a,b)=>b.t-a.t); return pending[0].m; }
        const upcoming = matches
            .filter(m=>m.status!=='finished'&&m.status!=='postponed')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t)&&t>now);
        if(upcoming.length){ upcoming.sort((a,b)=>a.t-b.t); return upcoming[0].m; }
        // 4. Último partido terminado — sin límite de tiempo para no perder
        //    partidos que acaban de terminar (ej: USA vs Paraguay FT)
        const finished = matches
            .filter(m=>m.status==='finished')
            .map(m=>({m,t:new Date(m.startTime).getTime()}))
            .filter(({t})=>!isNaN(t));
        if(finished.length){ finished.sort((a,b)=>b.t-a.t); return finished[0].m; }
        return null;
    }

    // Fechas en hora Argentina (UTC-3) — mismo criterio que elnine para indexar partidos
    function arDates() {
        const AR_OFFSET = -3 * 60; // minutos
        const now = new Date();
        const toAR = d => { const x = new Date(d); x.setMinutes(x.getMinutes() + AR_OFFSET - x.getTimezoneOffset()); return x; };
        const fmt  = d => toAR(d).toISOString().slice(0,10);
        const y = new Date(now); y.setDate(now.getDate()-1);
        const t = new Date(now); t.setDate(now.getDate()+1);
        return [fmt(y), fmt(now), fmt(t)];
    }

    // Llama directamente a elnine (funciona desde el browser, CORS está abierto)
    async function fetchScheduleDate(dateStr) {
        const url = `https://api.elnine.com.ar/schedule?date=${dateStr}&_t=${Date.now()}`;
        const r = await fetch(url, {cache:'no-store'});
        if(!r.ok) throw new Error(`elnine HTTP ${r.status}`);
        return (await r.json()).matches || [];
    }

    // Fetch directo a elnine para las 3 fechas en paralelo (estrategia principal)
    async function fetchAllDirect() {
        const dates = arDates();
        const results = await Promise.allSettled(dates.map(d => fetchScheduleDate(d)));
        const seen = new Set(), all = [];
        let okCount = 0;
        results.forEach((r, i) => {
            if(r.status==='fulfilled') {
                okCount++;
                for(const m of r.value) {
                    if(!seen.has(m.id)){ seen.add(m.id); all.push(m); }
                }
            } else {
                console.warn(`⚠️ fetchScheduleDate(${dates[i]}) falló:`, r.reason);
            }
        });
        // Si NINGUNA fecha pudo consultarse (CORS, red, etc.), no confiar en
        // "all=[]" como si fuera un resultado real — forzar fallback al bridge.
        if(okCount === 0) {
            throw new Error('fetchAllDirect: las 3 fechas fallaron (ver warnings arriba)');
        }
        return all;
    }

    // Bridge como fallback (solo útil en localhost)
    async function fetchAllViabridge() {
        const r = await fetch(`${API}/match?_t=${Date.now()}`, {cache:'no-store'});
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const all = [];
        for(const item of (data.items||[])) {
            for(const m of (item.matches||[])) all.push(m);
        }
        return all;
    }

    // Enriquece el partido con datos en tiempo real desde elnine /match/:id
    async function enrichLiveMatch(match) {
        // Intentar primero directo a elnine, fallback al bridge
        const urls = [
            `https://api.elnine.com.ar/match/${match.id}?_t=${Date.now()}`,
            `${API}/detail/${match.id}?_t=${Date.now()}`,
        ];
        for(const url of urls) {
            try {
                const r = await fetch(url, {cache:'no-store'});
                if(!r.ok) continue;
                const raw = await r.json();
                const d = raw.matchDetail ?? raw;

                match.homeScore    = d.homeTeam?.score   ?? match.homeScore;
                match.awayScore    = d.awayTeam?.score   ?? match.awayScore;
                match.minute       = d.minute             ?? match.minute;
                match.addedMinute  = d.addedMinute        ?? null;
                if(d.period) match.period = d.period;
                if(d.status) match.status = d.status;
                match.homeTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='home').length;
                match.awayTeamRedCards = (d.events||[]).filter(e=>e.type==='red'&&e.team==='away').length;
                match._events = d.events || [];
                break; // éxito, salir del loop
            } catch(e) { /* intentar siguiente URL */ }
        }
        return match;
    }

    async function fetchYellowCards(matchId) { /* reemplazado por enrichLiveMatch */ }

    async function poll() {
        try {
            let all = [];

            if(IS_LOCAL) {
                // Local: usar bridge primero (evita CORS en file://)
                try {
                    all = await fetchAllViabridge();
                    console.log(`🏠 Bridge local OK → ${all.length} partidos`);
                } catch(e) {
                    console.warn('Bridge local falló, intentando directo:', e.message);
                    all = await fetchAllDirect();
                }
            } else {
                // Online (GitHub Pages, etc.): llamar directo a elnine — el bridge de Render
                // está siendo bloqueado por elnine. elnine sí permite CORS desde browsers.
                try {
                    all = await fetchAllDirect();
                    console.log(`🌐 Elnine directo OK → ${all.length} partidos`);
                } catch(e) {
                    console.warn('Elnine directo falló, intentando bridge:', e.message);
                    all = await fetchAllViabridge();
                }
            }

            // Filtrar solo partidos del Mundial
            // Acepta cualquier slug que contenga 'world-cup' para cubrir
            // variantes como 'fifa-world-cup', 'fifa-world-cup-2026', etc.
            const WC_SLUGS = ['fifa-world-cup','fifa-world-cup-2026','world-cup-2026','world-cup'];
            const isWC = m => {
                const s = (m.tournamentCalendarSlug||'').toLowerCase();
                return WC_SLUGS.some(k=>s===k) || s.includes('world-cup');
            };
            const wc = all.filter(isWC);
            console.log(`📅 ${new Date().toISOString()} | Mundial: ${wc.length} partidos | slugs disponibles: ${[...new Set(all.map(m=>m.tournamentCalendarSlug))].join(', ')}`);
            wc.forEach(m=>console.log(`  [${m.status}] ${m.homeTeam.name} vs ${m.awayTeam.name} | ${m.startTime} | ${m.homeScore??'-'}:${m.awayScore??'-'} min:${m.minute??'-'}`));


            let match = CONFIG.autoMatch ? pickBest(wc) : wc.find(m=>m.id===CONFIG.matchId)||null;

            if(!match){ console.warn('⚠️ No hay partido del Mundial'); return; }

            // Si cambió el partido, resetear estado
            if(match.id !== CONFIG.matchId) {
                console.info(`🔄 Nuevo partido: ${match.homeTeam.name} vs ${match.awayTeam.name} (${match.id})`);
                CONFIG.matchId = match.id;
                fired.goalKeys.clear();
                fired.yH=0; fired.yA=0; fired.rH=0; fired.rA=0;
                fired.ht=false; fired.ft=false;
                prevYH=0; prevYA=0;
                state.ready=false;
            }

            // Enriquecer siempre en partidos live con datos de /detail (score, minuto, eventos)
            if(match.status==='live') {
                match = await enrichLiveMatch(match);
            }

            renderMatch(match);
            checkEvents(match);
            if(!state.ready) state.ready=true;

            // Amarillas en paralelo (no bloqueante)
            if(match.status==='live') fetchYellowCards(match.id);

        } catch(err) {
            console.error('❌ poll error:', err);
        }
    }

    // ── INIT ─────────────────────────────────────────────────────
    console.log(`🚀 Overlay iniciado | API: ${API} | local: ${IS_LOCAL}`);
    poll();
    setInterval(poll, CONFIG.pollIntervalMs);
    </script>
